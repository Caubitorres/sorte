<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de Cartelas - Bingo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { 
            --livre: #22c55e; 
            --reservada: #f59e0b; 
            --paga: #ef4444;      
            --selecionada: #7dd3fc; /* Azul Claro */
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .header-event { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .header-event h1 { margin: 0 0 10px 0; font-size: 26px; color: #222; }
        .info-texto-puro { font-size: 15px; color: #444; line-height: 1.8; }
        .info-texto-puro b { color: #000; font-weight: bold; }

        .section { margin-bottom: 30px; }
        .section h3 { font-size: 17px; color: #222; border-left: 4px solid #333; padding-left: 10px; margin-bottom: 15px; text-transform: uppercase; }

        .identificacao-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .identificacao-grid { grid-template-columns: 1fr; } }
        
        .bloco-id { background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 15px; margin-bottom: 10px; }
        
        .btn-recuperar { background: #455a64; color: white; border: none; border-radius: 5px; padding: 12px; width: 100%; font-size: 12px; cursor: pointer; font-weight: bold; }

        .painel-status { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 8px; }
        .stats { display: flex; gap: 15px; font-size: 14px; font-weight: bold; }
        .legenda { display: flex; gap: 12px; font-size: 12px; }
        .legenda-item { display: flex; align-items: center; gap: 5px; }
        .box-legenda { width: 14px; height: 14px; border-radius: 50%; }

        .grid-cartelas { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; }
        .cartela-item { 
            height: 65px; border: 2px solid #eee; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; background: #fff; transition: all 0.2s ease;
        }
        .cartela-item b { font-size: 18px; }
        .cartela-item span { font-size: 10px; font-weight: bold; text-align: center; width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .disponivel { border-color: var(--livre); color: var(--livre); }
        .reservada { background: var(--reservada) !important; color: white !important; border: none; cursor: not-allowed; }
        .paga { background: var(--paga) !important; color: white !important; border: none; cursor: not-allowed; }
        .selecionada { background: var(--selecionada) !important; color: #0369a1 !important; border: 2px solid #0ea5e9 !important; transform: scale(1.05); }

        .resumo-box { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto; font-size: 14px; }
        .btn-acao { border: none; border-radius: 8px; padding: 16px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-confirm { background: #1565c0; color: white; }
        .btn-whatsapp { background: #2e7d32; color: white; }
        .btn-imprimir { background: #212121; color: white; margin-top: 15px; display: none; }

        /* --- ESTILO DE IMPRESSÃO PROFISSIONAL (TICKET) --- */
        #areaImpressao { display: none; }
        @media print {
            @page { size: A4 landscape; margin: 0; }
            body * { visibility: hidden; }
            #areaImpressao, #areaImpressao * { visibility: visible; }
            #areaImpressao { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100vh; position: absolute; left: 0; top: 0; }
            .ticket { height: 100vh; padding: 15mm; border-right: 1px dashed #ccc; box-sizing: border-box; display: flex; flex-direction: column; position: relative; }
            .ticket-header { text-align: center; font-size: 18px; font-weight: bold; color: #0056b3; text-transform: uppercase; }
            .num-print { text-align: center; font-size: 45px; font-weight: 900; margin: 10px 0; border-bottom: 2px solid #000; }
            .box-premios-print { border: 1px solid #f59e0b; border-radius: 6px; padding: 8px; margin: 5px 0; font-size: 11px; text-align: center; color: #856404; font-weight: bold; }
            .info-linha-print { font-size: 10px; text-align: center; margin-bottom: 10px; text-transform: uppercase; }
            .cliente-print { border: 1px solid #ddd; padding: 8px; font-size: 12px; font-weight: bold; text-align: center; border-radius: 5px; }
            .status-print { border: 2px solid red; border-radius: 5px; padding: 6px; color: red; font-weight: bold; text-align: center; font-size: 14px; margin-top: 5px; }
            .pago-ok { border-color: green; color: green; }
            .tabela-bingo { width: 100%; border-collapse: collapse; margin-top: 15px; }
            .tabela-bingo th, .tabela-bingo td { border: 2px solid #000; height: 45px; font-size: 24px; font-weight: bold; text-align: center; }
            .footer-print { position: absolute; bottom: 10mm; left: 15mm; right: 15mm; font-size: 10px; color: #666; text-align: center; border-top: 1px solid #eee; padding-top: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-event">
        <h1 id="view-nome">Bingo</h1>
        <div class="info-texto-puro">
            Data: <b id="view-data">--</b> | Local: <b id="view-local">--</b> | Valor: <b id="view-valor">--</b><br>
            Prêmios: <b id="view-premios">--</b> | Letras: <b id="view-letras">--</b>
        </div>
    </div>

    <div class="section">
        <h3>1. Identificação</h3>
        <div class="identificacao-grid">
            <div class="bloco-id">
                <input type="text" id="comp-nome" placeholder="Nome e Sobrenome">
                <input type="tel" id="comp-whatsapp" placeholder="WhatsApp (11 dígitos com DDD)" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <div class="bloco-id">
                <button class="btn-recuperar" onclick="recuperarCartelas()">VER MINHAS CARTELAS</button>
            </div>
        </div>
    </div>

    <div class="section">
        <h3>2. Escolha sua Cartela</h3>
        <div class="painel-status">
            <div class="stats">
                <span style="color:var(--livre)">Livres: <span id="st-disp">0</span></span>
                <span style="color:var(--reservada)">Reserv.: <span id="st-res">0</span></span>
                <span style="color:var(--paga)">Pagas: <span id="st-paga">0</span></span>
            </div>
            <div class="legenda">
                <div class="legenda-item"><div class="box-legenda" style="border: 2px solid var(--livre)"></div> Livre</div>
                <div class="legenda-item"><div class="box-legenda" style="background:var(--reservada)"></div> Reservada</div>
                <div class="legenda-item"><div class="box-legenda" style="background:var(--paga)"></div> Paga</div>
                <div class="legenda-item"><div class="box-legenda" style="background:var(--selecionada)"></div> Seleção</div>
            </div>
        </div>
        <div class="grid-cartelas" id="gridCartelas"></div>
    </div>

    <div class="section">
        <h3>3. Resumo e Pagamento</h3>
        <div id="resumoNumeros" class="resumo-box">Nenhuma cartela selecionada.</div>
        <div style="display: flex; justify-content: space-between; margin: 20px 0; font-weight: bold; font-size: 20px;">
            <span>Qtd: <span id="res-qtd">0</span></span>
            <span style="color:var(--livre)" id="res-valor">R$ 0,00</span>
        </div>
        <button class="btn-acao btn-confirm" onclick="reservar()">RESERVAR SELECIONADAS</button>
        <button class="btn-acao btn-whatsapp" onclick="enviarWhatsApp()">ENVIAR COMPROVANTE WHATSAPP</button>
        <button id="btnImprimir" class="btn-acao btn-imprimir" onclick="prepararImpressao()">🖨️ IMPRIMIR CARTELAS</button>
    </div>
</div>

<div id="areaImpressao"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
    authDomain: "bingo-facuc.firebaseapp.com",
    databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com/",
    projectId: "bingo-facuc",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let dadosBingo = {};
let selecionadas = [];
let precoUnit = 0;

db.ref("bingo").on("value", snap => {
    dadosBingo = snap.val() || {};
    const d = dadosBingo;
    document.getElementById("view-nome").innerText = d.nomeBingo || "Bingo";
    document.getElementById("view-data").innerText = d.dataBingo || "--";
    document.getElementById("view-local").innerText = d.localBingo || "--";
    document.getElementById("view-valor").innerText = d.valorCartela || "R$ 0,00";
    document.getElementById("view-premios").innerText = d.descricaoPremios || "--";
    document.getElementById("view-letras").innerText = (d.letras || []).join(" ");
    precoUnit = parseFloat((d.valorCartela || "0").replace(/[^\d,]/g, "").replace(",", "."));
    renderizar();
});

function renderizar() {
    const grid = document.getElementById("gridCartelas");
    grid.innerHTML = "";
    const cartelas = dadosBingo.cartelas || {};
    const vendas = dadosBingo.vendas || {};
    const ids = Object.keys(cartelas).sort((a,b) => a - b);
    let st = { disp: 0, res: 0, paga: 0 };

    ids.forEach(num => {
        const v = vendas[num];
        const status = v ? v.status : "disponivel";
        st[status === "disponivel" ? "disp" : (status === "reservada" ? "res" : "paga")]++;
        
        const div = document.createElement("div");
        div.className = `cartela-item ${status} ${selecionadas.includes(num) ? 'selecionada' : ''}`;
        div.innerHTML = `<b>${num}</b><span>${v ? v.comprador.split(" ")[0] : ""}</span>`;
        
        div.onclick = () => {
            if(status !== 'disponivel') return;
            selecionadas.includes(num) ? selecionadas = selecionadas.filter(n => n !== num) : selecionadas.push(num);
            atualizar();
            renderizar();
        };
        grid.appendChild(div);
    });

    document.getElementById("st-disp").innerText = st.disp;
    document.getElementById("st-res").innerText = st.res;
    document.getElementById("st-paga").innerText = st.paga;
}

function atualizar() {
    const lista = document.getElementById("resumoNumeros");
    lista.innerHTML = selecionadas.length ? "" : "Nenhuma cartela selecionada.";
    selecionadas.forEach(n => {
        const d = document.createElement("div");
        d.style.padding = "5px 0";
        d.innerHTML = `<strong>Cartela ${n}:</strong> ${dadosBingo.cartelas[n].join(", ")}`;
        lista.appendChild(d);
    });
    document.getElementById("res-qtd").innerText = selecionadas.length;
    document.getElementById("res-valor").innerText = (selecionadas.length * precoUnit).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}

function recuperarCartelas() {
    const zap = document.getElementById("comp-whatsapp").value;
    if(!zap) return alert("Digite seu WhatsApp.");
    const v = dadosBingo.vendas || {};
    let encontradas = [];
    for(let n in v) { if(v[n].whatsapp === zap) { encontradas.push(n); document.getElementById("comp-nome").value = v[n].comprador; } }
    if(encontradas.length) {
        selecionadas = encontradas;
        atualizar();
        renderizar();
        document.getElementById("btnImprimir").style.display = "block";
    } else { alert("Nenhuma encontrada."); }
}

function reservar() {
    const nome = document.getElementById("comp-nome").value;
    const zap = document.getElementById("comp-whatsapp").value;
    if(!nome || !zap || !selecionadas.length) return alert("Preencha os dados.");
    selecionadas.forEach(n => { db.ref(`bingo/vendas/${n}`).set({ comprador: nome, whatsapp: zap, status: "reservada" }); });
    alert("Reservado! Envie o comprovante.");
}

function enviarWhatsApp() {
    const texto = `Bingo: ${dadosBingo.nomeBingo}\nCartelas: ${selecionadas.join(", ")}\nTotal: ${document.getElementById("res-valor").innerText}\n\nVou te enviar meu comprovante.`;
    window.open(`https://wa.me/5584998396406?text=${encodeURIComponent(texto)}`, "_blank");
}

function prepararImpressao() {
    const zap = document.getElementById("comp-whatsapp").value;
    const area = document.getElementById("areaImpressao");
    const v = dadosBingo.vendas || {};
    const c = dadosBingo.cartelas || {};
    const letras = dadosBingo.letras || ["B", "I", "N", "G", "O"];
    let html = "";
    for(let n in v) {
        if(v[n].whatsapp === zap) {
            const isPago = v[n].status === "paga";
            const statusTxt = isPago ? "PAGAMENTO CONFIRMADO" : "CARTELA " + n + " - PAGAMENTO PENDENTE";
            const statusClass = isPago ? "status-print pago-ok" : "status-print";
            const nums = c[n] || [];
            html += `
                <div class="ticket">
                    <div class="ticket-header">${dadosBingo.nomeBingo}</div>
                    <div class="num-print">${n}</div>
                    <div class="box-premios-print">🎁 PRÊMIOS: ${dadosBingo.descricaoPremios}</div>
                    <div class="info-linha-print">DATA: ${dadosBingo.dataBingo} | LOCAL: ${dadosBingo.localBingo}</div>
                    <div class="cliente-print">COMPRADOR: ${v[n].comprador}</div>
                    <div class="${statusClass}">${statusTxt}</div>
                    <table class="tabela-bingo">
                        <thead><tr>${letras.map(l => `<th>${l}</th>`).join("")}</tr></thead>
                        <tbody>
                            ${[0,1,2,3,4].map(r => `<tr>${[0,1,2,3,4].map(col => `<td>${nums[r + col*5] || ""}</td>`).join("")}</tr>`).join("")}
                        </tbody>
                    </table>
                    <div class="footer-print">Gerado em: ${new Date().toLocaleString('pt-BR')}</div>
                </div>`;
        }
    }
    if(html) { area.innerHTML = html; window.print(); } else { alert("Nenhuma cartela encontrada para imprimir."); }
}
</script>
</body>
</html>
