<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Layout Otimizado Econômico</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #525659; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .sidebar { width: 380px; background: #fff; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.3); overflow-y: auto; z-index: 100; color: #333; }
        .preview-area { flex-grow: 1; padding: 10px; display: flex; justify-content: center; overflow-y: auto; }
        
        .a4-page { 
            background: white; 
            padding: 8mm 15mm; 
            box-sizing: border-box; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            display: flex; 
            position: relative; 
            gap: 5mm; 
        }
        .retrato { width: 210mm; min-height: 295mm; flex-direction: column; }
        .paisagem { width: 297mm; min-height: 210mm; flex-direction: row; }

        .linha-divisora { position: absolute; border: 1px dashed #aaa; pointer-events: none; z-index: 50; }
        .retrato .linha-divisora { width: 100%; top: 50%; left: 0; }
        .paisagem .linha-divisora { height: 100%; left: 50%; top: 0; }

        .ticket-preview { padding: 2mm; display: flex; flex-direction: column; flex: 1; position: relative; background: #fff; width: 100%; }
        
        /* CABEÇALHO MAXIMIZADO */
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 4px solid #000; padding-bottom: 8px; margin-bottom: 8px; }
        .info-evento { text-align: left; flex: 1; }
        
        .nome-bingo { 
            font-size: 45px; 
            font-weight: 900; 
            margin: 0; 
            letter-spacing: -2px; 
            text-transform: uppercase; 
            line-height: 0.85; 
            color: #000; 
        }
        
        .detalhes-evento { 
            font-size: 16px; 
            margin-top: 8px; 
            line-height: 1.2; 
            text-transform: uppercase;
        }

        .detalhes-evento b { font-weight: 900; }
        .detalhes-evento span { font-weight: 400; }

        .premios-box { 
            font-size: 16px; 
            margin-top: 6px; 
            padding-top: 4px; 
            border-top: 2px solid #000; 
        }
        .premios-box b { font-weight: 900; }
        .premios-box span { font-weight: 400; }
        
        .box-numero-status { display: flex; flex-direction: column; align-items: center; width: 95px; gap: 2px; }
        .num-destaque-box { border: 4px solid #000; width: 95px; height: 95px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; }
        .num-destaque-box span { font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: -4px; }
        .num-destaque-box b { font-size: 55px; line-height: 1; }
        
        .status-badge { font-size: 12px; font-weight: 900; padding: 5px 0; text-transform: uppercase; width: 95px; text-align: center; box-sizing: border-box; border: 4px solid #000; margin-top: -3px; }
        .status-nao-paga { background: #fff; color: #000; }
        .status-paga { background: #000; color: #fff; }

        .info-comprador { margin-bottom: 10px; font-size: 16px; border-bottom: 2px solid #000; padding-bottom: 5px; width: 100%; display: flex; gap: 10px; }
        .info-comprador b { font-weight: 900; }
        .info-comprador span { font-weight: 400; }

        .chamadas-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 12px; width: 100%; }
        .titulo-chamada { font-size: 18px; font-weight: 900; text-align: center; background: #eee; margin-bottom: 2px; border: 2px solid #000; }
        
        .mini-table { border-collapse: collapse; width: 100%; }
        .mini-table th { background: #fff; color: #000; border: 4px solid #000; font-size: 1.6em; padding: 5px 0; font-weight: 900; }
        .mini-table td { border: 1px solid #000; text-align: center; font-weight: bold; padding: 8px; }
        
        .footer-container { margin-top: auto; text-align: center; width: 100%; padding-top: 10px; border-top: 1px solid #ccc; }
        .footer-nota { font-size: 15px; font-weight: 900; margin-bottom: 4px; text-transform: uppercase; }
        .footer-geracao { font-size: 11px; color: #333; font-weight: bold; }

        .control-group { margin-bottom: 15px; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 6px; color: #555; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-save { background: #00c853; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-save:hover { background: #00a042; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin-top:0">Configurações</h2>
    <div class="control-group">
        <label>Layout da Folha</label>
        <select id="cfg-layout" onchange="atualizarPreview()">
            <option value="retrato-1">1 Cartela (Folha Inteira)</option>
            <option value="retrato-2" selected>2 Cartelas (Vertical)</option>
            <option value="paisagem-2">2 Cartelas (Lado a Lado)</option>
        </select>
    </div>
    <div class="control-group">
        <label>Número de Chamadas</label>
        <select id="cfg-chamadas" onchange="atualizarPreview()">
            <option value="1">1 Chamada (Grande)</option>
            <option value="2">2 Chamadas</option>
            <option value="3" selected>3 Chamadas (Completa)</option>
        </select>
    </div>
    <div class="control-group">
        <label>Frase de Rodapé (Destaque)</label>
        <textarea id="cfg-aviso" rows="2" oninput="atualizarPreview()">ESTA CARTELA SÓ CONCORRE AOS PRÊMIOS SE TIVER SIDO PAGA!</textarea>
    </div>
    <div class="control-group">
        <label>Tamanho Números (Principal)</label>
        <input type="range" id="cfg-fMain" min="20" max="60" value="42" oninput="atualizarPreview()">
    </div>
    <div class="control-group">
        <label>Tamanho Números (Secundárias)</label>
        <input type="range" id="cfg-fSec" min="10" max="35" value="20" oninput="atualizarPreview()">
    </div>
    <button class="btn-save" onclick="salvarConfiguracao()">SALVAR CONFIGURAÇÃO</button>
</div>

<div class="preview-area">
    <div id="preview-folha" class="a4-page retrato"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
    authDomain: "bingo-facuc.firebaseapp.com",
    databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com/",
    projectId: "bingo-facuc",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let letrasBingo = ["B","I","N","G","O"];
let dadosGlobais = {};

db.ref("bingo").on("value", snap => {
    if(snap.exists()) {
        dadosGlobais = snap.val();
        if(dadosGlobais.letras) letrasBingo = dadosGlobais.letras;
        atualizarPreview();
    }
});

function atualizarPreview() {
    const layout = document.getElementById("cfg-layout").value;
    const nChamadas = parseInt(document.getElementById("cfg-chamadas").value);
    const aviso = document.getElementById("cfg-aviso").value;
    const fMain = document.getElementById("cfg-fMain").value;
    const fSec = document.getElementById("cfg-fSec").value;

    const folha = document.getElementById("preview-folha");
    folha.className = `a4-page ${layout.split('-')[0]}`;
    folha.innerHTML = "";

    const qtd = parseInt(layout.split('-')[1]);
    if(qtd > 1) {
        const diviso = document.createElement("div");
        diviso.className = "linha-divisora";
        folha.appendChild(diviso);
    }

    for(let i=0; i < qtd; i++) {
        const ticket = document.createElement("div");
        ticket.className = "ticket-preview";
        
        const statusTexto = (i % 2 === 0) ? "CARTELA PAGA" : "NÃO PAGA";
        const statusClasse = (i % 2 === 0) ? "status-paga" : "status-nao-paga";

        // Corrigido para não duplicar o R$
        let valorExibicao = dadosGlobais.valorCartela || '0,00';
        if (!valorExibicao.includes('R$')) {
            valorExibicao = 'R$ ' + valorExibicao;
        }

        let chamadasHTML = `
            <div style="width:100%">
                <div class="titulo-chamada">1ª CHAMADA</div>
                <table class="mini-table" style="font-size:${fMain}px">${gerarTabela()}</table>
            </div>`;

        if(nChamadas >= 2) {
            chamadasHTML += `<div style="display:flex; gap:15px; width:100%; justify-content:center; margin-top:5px;">
                <div style="flex:1"><div class="titulo-chamada">2ª CHAMADA</div><table class="mini-table" style="font-size:${fSec}px; width:100%">${gerarTabela()}</table></div>`;
            if(nChamadas === 3) {
                chamadasHTML += `<div style="flex:1"><div class="titulo-chamada">3ª CHAMADA</div><table class="mini-table" style="font-size:${fSec}px; width:100%">${gerarTabela()}</table></div>`;
            }
            chamadasHTML += `</div>`;
        }

        ticket.innerHTML = `
            <div class="header-top">
                <div class="info-evento">
                    <h1 class="nome-bingo">${dadosGlobais.nomeBingo || 'BINGO'}</h1>
                    <div class="detalhes-evento">
                        <b>LOCAL:</b> <span>${dadosGlobais.localBingo || '---'}</span><br>
                        <b>DATA:</b> <span>${dadosGlobais.dataBingo || '---'}</span> | <b>HORA:</b> <span>${dadosGlobais.horaBingo || '--:--h'}</span><br>
                        <b>VALOR DA CARTELA:</b> <span>${valorExibicao}</span>
                    </div>
                    <div class="premios-box">
                        <b>PRÊMIOS:</b> <span>${dadosGlobais.descricaoPremios || '---'}</span>
                    </div>
                </div>
                <div class="box-numero-status">
                    <div class="num-destaque-box">
                        <span>Nº CARTELA</span>
                        <b>${i+1}</b>
                    </div>
                    <div class="status-badge ${statusClasse}">${statusTexto}</div>
                </div>
            </div>
            <div class="info-comprador">
                <div style="flex:2"><b>COMPRADOR:</b> <span>EXEMPLO DE NOME</span></div>
                <div style="flex:1"><b>ZAP:</b> <span>(84) 9.0000-0000</span></div>
            </div>
            <div class="chamadas-container">${chamadasHTML}</div>
            <div class="footer-container">
                <div class="footer-nota">${aviso}</div>
                <div class="footer-geracao">Gerado em: ${new Date().toLocaleDateString()} - Sistema Bingo Pro</div>
            </div>
        `;
        folha.appendChild(ticket);
    }
}

function gerarTabela() {
    let h = `<thead><tr>${letrasBingo.map(l => `<th>${l}</th>`).join("")}</tr></thead>`;
    for(let r=0; r<5; r++) h += `<tr>${Array(5).fill(`<td>XX</td>`).join("")}</tr>`;
    return h;
}

async function salvarConfiguracao() {
    const config = {
        layout: document.getElementById("cfg-layout").value,
        nChamadas: document.getElementById("cfg-chamadas").value,
        aviso: document.getElementById("cfg-aviso").value,
        fMain: document.getElementById("cfg-fMain").value,
        fSec: document.getElementById("cfg-fSec").value
    };
    await db.ref("bingo/config_impressao").set(config);
    alert("Configuração Salva com sucesso!");
}

atualizarPreview();
</script>
</body>
</html>
