<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Vendas - Bingo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Dashboard Superior */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .card-stat {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-bottom: 5px solid #ccc;
        }
        .card-stat h4 { margin: 0; color: #666; font-size: 11px; text-transform: uppercase; }
        .card-stat p { margin: 8px 0 0; font-size: 22px; font-weight: bold; }
        .card-finance { background: #e8f5e9; border-color: #2e7d32; }

        /* Botões de Controle */
        .controles-mestre {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn { border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-pagar-todos { background: #2e7d32; color: white; }
        .btn-reset { background: #d32f2f; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tabela */
        .tabela-vendas { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tabela-vendas th { background: #333; color: white; padding: 15px; text-align: left; }
        .tabela-vendas td { padding: 12px 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-reservada { background: #fff9c4; color: #f57c00; }
        .status-paga { background: #c8e6c9; color: #2e7d32; }

        .btn-confirmar { background: #1976d2; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-liberar { background: #607d8b; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        .link-zap { color: #25d366; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .link-zap:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="titulo-bingo" style="text-align: center; color: #333; margin-bottom: 5px;">Painel de Controle de Vendas</h2>
    <p id="subtitulo-bingo" style="text-align: center; color: #666; margin-bottom: 25px; font-weight: bold;"></p>

    <div class="dashboard">
        <div class="card-stat">
            <h4>Total Cartelas</h4>
            <p id="dash-total">0</p>
        </div>
        <div class="card-stat">
            <h4>Livres</h4>
            <p id="dash-livres">0</p>
        </div>
        <div class="card-stat" style="border-color: #ffd600;">
            <h4>Reservadas</h4>
            <p id="dash-res">0</p>
        </div>
        <div class="card-stat" style="border-color: #4caf50;">
            <h4>Pagas</h4>
            <p id="dash-pagas">0</p>
        </div>
        <div class="card-stat card-finance">
            <h4>Recebido</h4>
            <p id="dash-recebido" style="color: #2e7d32;">R$ 0,00</p>
        </div>
        <div class="card-stat" style="background: #fff3e0; border-color: #ff9800;">
            <h4>A Receber</h4>
            <p id="dash-areceber" style="color: #e65100;">R$ 0,00</p>
        </div>
    </div>

    <div class="controles-mestre">
        <button class="btn btn-pagar-todos" onclick="pagarTodasReservadas()">
            ✅ ATIVAR PAGAMENTO DE TODAS
        </button>
        
        <button class="btn btn-reset" onclick="resetarVendas()">
            <span>🗑️</span> ZERAR VENDAS E LIMPAR TUDO
        </button>
    </div>

    <table class="tabela-vendas">
        <thead>
            <tr>
                <th>Nº</th>
                <th>Comprador</th>
                <th>WhatsApp (Clique p/ falar)</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
    authDomain: "bingo-facuc.firebaseapp.com",
    databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com/",
    projectId: "bingo-facuc",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("bingo").on("value", snap => {
    const dados = snap.val() || {};
    const cartelas = dados.cartelas || {};
    const vendas = dados.vendas || {};
    
    // Puxa o nome do Bingo
    const nomeBingo = dados.nomeBingo || "Bingo Online";
    document.getElementById("subtitulo-bingo").innerText = nomeBingo;

    const precoUnit = parseFloat((dados.valorCartela || "0").replace(/[^\d,]/g, "").replace(",", "."));

    const totalCartelas = Object.keys(cartelas).length;
    let qtdPagas = 0;
    let qtdRes = 0;

    const tbody = document.getElementById("corpoTabela");
    tbody.innerHTML = "";

    const vendasOrdenadas = Object.keys(vendas).sort((a,b) => a - b);
    
    vendasOrdenadas.forEach(num => {
        const v = vendas[num];
        if(v.status === "paga") qtdPagas++;
        if(v.status === "reservada") qtdRes++;

        // Limpa o número do WhatsApp (remove caracteres não numéricos)
        const zapLimpo = v.whatsapp.replace(/\D/g, '');
        const mensagem = encodeURIComponent(`Olá, ${v.comprador}. Quero falar com você sobre sua reserva no ${nomeBingo}.`);
        const linkWhatsapp = `https://wa.me/55${zapLimpo}?text=${mensagem}`;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td><b>${num}</b></td>
            <td>${v.comprador}</td>
            <td>
                <a href="${linkWhatsapp}" target="_blank" class="link-zap">
                    📱 ${v.whatsapp}
                </a>
            </td>
            <td><span class="status-badge status-${v.status}">${v.status.toUpperCase()}</span></td>
            <td>
                ${v.status === 'reservada' ? `<button class="btn-confirmar" onclick="confirmarPaga('${num}')">Confirmar Pago</button>` : ''}
                <button class="btn-liberar" onclick="liberarCartela('${num}')">Liberar</button>
            </td>
        `;
        tbody.appendChild(tr);
    });

    // Atualizar Contadores
    document.getElementById("dash-total").innerText = totalCartelas;
    document.getElementById("dash-pagas").innerText = qtdPagas;
    document.getElementById("dash-res").innerText = qtdRes;
    document.getElementById("dash-livres").innerText = totalCartelas - (qtdPagas + qtdRes);

    // Atualizar Financeiro
    const totalRecebido = qtdPagas * precoUnit;
    const totalAReceber = qtdRes * precoUnit;

    document.getElementById("dash-recebido").innerText = totalRecebido.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
    document.getElementById("dash-areceber").innerText = totalAReceber.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
});

function pagarTodasReservadas() {
    if(confirm("Deseja marcar TODAS as reservadas como PAGAS?")) {
        db.ref("bingo/vendas").once("value", snap => {
            const vendas = snap.val() || {};
            const updates = {};
            for(let n in vendas) {
                if(vendas[n].status === "reservada") updates[`${n}/status`] = "paga";
            }
            db.ref("bingo/vendas").update(updates);
        });
    }
}

function resetarVendas() {
    if(prompt("Digite ZERAR para apagar todas as vendas:") === "ZERAR") {
        db.ref("bingo/vendas").remove();
    }
}

function confirmarPaga(num) {
    db.ref(`bingo/vendas/${num}`).update({ status: "paga" });
}

function liberarCartela(num) {
    if(confirm(`Deseja realmente liberar a cartela ${num}? Ela voltará a ficar disponível para venda.`)) {
        db.ref(`bingo/vendas/${num}`).remove();
    }
}
</script>
</body>
</html>
