<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressão em Lote - Bingo Pro V4.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
@media print {
    .no-print { display: none !important; }

    body {
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    @page {
        size: A4;
        margin: 0;
    }

    .folha-a4 {
        width: 21cm;
        height: 29.7cm;
        padding: 1cm;
        margin: 0;
        box-sizing: border-box;

        display: flex;
        flex-direction: column;

        page-break-inside: avoid;
        break-inside: avoid;
        page-break-after: always;
    }

    .folha-a4:last-child {
        page-break-after: auto;
    }
}

@media screen {
    body {
        background: #e2e8f0;
        padding: 20px;
    }

    .folha-a4 {
        width: 21cm;
        height: 29.7cm;
        padding: 1cm;
        margin: 0 auto 20px;
        background: white;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }
}

.folha-a4 { color: black; }

.header-container { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid #000; padding-bottom: 8px; }
.info-evento { display: flex; flex-direction: column; flex-grow: 1; }
.box-numero { border: 4px solid #000; text-align: center; min-width: 145px; margin-left: 15px; }
.box-numero .label { font-size: 12px; border-bottom: 2px solid #000; padding: 2px; font-weight: bold; }
.box-numero .num { font-size: 46px; font-weight: 900; line-height: 1; padding: 5px; }
.box-numero .status-label { background: #000; color: #fff; font-size: 14px; padding: 4px; font-weight: bold; text-transform: uppercase; }

.secao-venda-cliente { border-top: 1px dashed #000; border-bottom: 2px solid #000; padding: 6px 0; margin-top: 5px; display: flex; justify-content: space-between; font-weight: 900; font-size: 14px; text-transform: uppercase; }

.grade-bingo-layout { border: 2px solid #000; display: grid; grid-template-columns: repeat(5, 1fr); width: 100%; }
.celula { border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-weight: 400; line-height: 1; }
.letra-topo { background: #f0f0f0; border-bottom: 3px solid #000; font-weight: 900 !important; }

[data-chamadas="1"] .celula { height: 105px; font-size: 75px; }
[data-chamadas="2"] .celula { height: 58px; font-size: 42px; }
[data-chamadas="3"] .celula { height: 48px; font-size: 38px; }

.wrapper-chamada { display: flex; flex-direction: column; align-items: center; width: 100%; }
.titulo-chamada-selo { background: #000; color: #fff; padding: 3px 25px; font-size: 12px; font-weight: 900; text-transform: uppercase; border-radius: 5px 5px 0 0; width: fit-content; margin-top: 4px; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="no-print mb-6 text-center">
        <button onclick="window.print()" class="bg-black text-white px-12 py-4 rounded-xl font-bold shadow-2xl hover:scale-105 transition-all">
            🖨️ IMPRIMIR LOTE A4
        </button>
    </div>

    <div id="renderArea"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0PhZe0AuMTA14W8vzsfn4evxBBLzh4sw",
            authDomain: "bingodocau.firebaseapp.com",
            projectId: "bingodocau",
            storageBucket: "bingodocau.firebasestorage.app",
            messagingSenderId: "1052598479472",
            appId: "1:1052598479472:web:a0b2477b5cdbe9528ce2b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarLote() {
            const params = new URLSearchParams(window.location.search);
            const idB = params.get('id');
            const zapFiltro = (params.get('whats') || "").replace(/\D/g, "");
            if(!idB || !zapFiltro) return;

            const bSnap = await getDoc(doc(db, "bingos", "bingo_" + idB));
            const cSnap = await getDocs(collection(db, "bingos", "bingo_" + idB, "cartelas"));

            if(bSnap.exists()) {
                const bingo = bSnap.data();
                let cartelas = [];
                cSnap.forEach(doc => {
                    const c = doc.data();
                    if((c.whatsapp || "").replace(/\D/g, "") === zapFiltro) cartelas.push({ id: doc.id, ...c });
                });
                cartelas.sort((a, b) => Number(a.n) - Number(b.n));
                const renderArea = document.getElementById('renderArea');
                cartelas.forEach(c => renderArea.innerHTML += criarTemplate(bingo, c));
            }
        }

        function criarTemplate(b, c) {
            const qtd = parseInt(b.qtdChamadas || "1");
            const letras = b.letras.split("");
            const statusText = c.status === 'paga' ? 'PAGA' : 'RESERVADA';

            const dataFormatada = b.data && b.data.includes('-') 
                ? b.data.split('-').reverse().join('/') 
                : (b.data || "00/00/0000");

            const gradeHtml = (titulo, isHalf = false) => `
                <div class="wrapper-chamada ${isHalf ? 'flex-1' : 'w-full'}">
                    <div class="titulo-chamada-selo">${titulo}</div>
                    <div class="grade-bingo-layout">
                        ${letras.map(l => `<div class="celula letra-topo">${l}</div>`).join("")}
                        ${[...c.b, ...c.i, ...c.n_col, ...c.g, ...c.o].map(n => `<div class="celula">${n}</div>`).join("")}
                    </div>
                </div>`;

            let corpo = gradeHtml("1ª CHAMADA");
            if(qtd == 2) corpo += gradeHtml("2ª CHAMADA");
            if(qtd == 3) corpo += `<div class="flex w-full gap-6">${gradeHtml("2ª CHAMADA", true)}${gradeHtml("3ª CHAMADA", true)}</div>`;

            return `
            <div class="folha-a4" data-chamadas="${qtd}">
                <div class="header-container">
                    <div class="info-evento">
                        <h1 class="text-5xl font-black uppercase leading-none mb-1">${b.nome}</h1>
                        <div class="text-[14px] font-bold uppercase tracking-tight">LOCAL: ${b.local}</div>
                        <div class="text-[14px] font-bold uppercase tracking-tight mt-0.5">
                            DATA: ${dataFormatada} ÀS ${b.hora} | VALOR: R$ ${b.valor}
                        </div>
                    </div>
                    <div class="box-numero">
                        <div class="label">CARTELA Nº</div>
                        <div class="num">${c.n}</div>
                        <div class="status-label">${statusText}</div>
                    </div>
                </div>
                
                <div class="text-[16px] font-extrabold uppercase mt-2 border-l-8 border-black pl-3 py-0.5">PRÊMIOS: ${b.premios || "---"}</div>
                
                <div class="secao-venda-cliente">
                    <span>COMPRADOR: ${c.comprador || "---"}</span>
                    <span>WHATSAPP: ${c.whatsapp || "---"}</span>
                </div>

                <div class="flex flex-col justify-center gap-2">
                    ${corpo}
                </div>

                <div class="text-center border-t-4 border-black pt-2 mt-2">
                    <p class="text-xl uppercase tracking-tight leading-none">${b.rodape || "ESTA CARTELA SÓ CONCORRE SE TIVER SIDO PAGA!"}</p>
                    <p class="text-[11px] font-bold mt-1.5 uppercase tracking-widest border-t border-black pt-1">
                        AUTENTICAÇÃO: ${c.n}-${Date.now()} | GERAÇÃO: ${new Date().toLocaleDateString('pt-BR')} ${new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}
                    </p>
                </div>
            </div>`;
        }

        carregarLote();
    </script>
</body>
</html>
