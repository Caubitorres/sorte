<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELAO ONLINE - BINGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .marcado { background-color: #22c55e !important; color: white !important; font-weight: bold; transform: scale(1.1); transition: all 0.3s; }
        .grid-bingo { display: grid; grid-template-columns: repeat(16, minmax(0, 1fr)); gap: 2px; }
        @media (min-width: 768px) { .bola-gigante { font-size: 12rem; } }
        @media (max-width: 767px) { .bola-gigante { font-size: 6rem; } }
        .animar-ganhador { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .btn-som-mini {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 100;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 20px;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

<div class="min-h-screen flex flex-col p-2 md:p-4">
    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl shadow-2xl mb-4 border-b-4 border-green-600">
        <div>
            <h1 id="nomeBingo" class="text-2xl md:text-4xl font-black text-green-500 uppercase italic">CARREGANDO...</h1>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px] md:text-sm">
                📅 <span id="data">--/--/--</span> | 📍 <span id="local">---</span>
            </p>
        </div>
        <div class="text-center bg-slate-700 px-4 md:px-8 py-1 md:py-2 rounded-xl border-2 border-slate-600 flex flex-col items-center">
            <p id="contador" class="text-2xl md:text-5xl font-black text-white leading-none">00</p>
            <p class="text-[10px] font-black uppercase text-slate-400 italic mt-1 leading-none">Bolas</p>
        </div>
    </div>

    <div class="flex-1 grid grid-cols-1 md:grid-cols-12 gap-4">
        <div class="md:col-span-4 flex flex-col justify-center items-center bg-slate-800 rounded-3xl border-4 border-slate-700 relative py-8 md:py-0">
            <p class="font-black text-slate-500 uppercase text-lg mb-2">Última Bola</p>
            <div id="ultima" class="bola-gigante font-black text-green-500 italic leading-none">--</div>
            
            <div id="painelGanhador" class="hidden absolute inset-0 bg-green-600 flex flex-col items-center justify-center rounded-2xl z-50 animar-ganhador p-4 text-center">
                <h2 class="text-3xl md:text-5xl font-black mb-2 italic">TEMOS GANHADOR!</h2>
            </div>
        </div>

        <div class="md:col-span-8 flex flex-col gap-4">
            <div class="bg-slate-800 p-2 md:p-4 rounded-2xl shadow-inner border border-slate-700">
                <div id="grade" class="grid-bingo"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-red-900/20 border-2 border-red-800/50 p-4 rounded-2xl">
                    <h3 class="text-red-500 font-black uppercase text-xs mb-2 italic">🔥 Cartelas Armadas</h3>
                    <div id="quase" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl border-2 border-slate-700">
                    <h3 class="text-green-500 font-black uppercase text-xs mb-2 italic">🏆 Lista de Ganhadores</h3>
                    <table class="w-full text-left">
                        <tbody id="ganhadores" class="text-sm font-bold"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<button id="btnAtivarSom" class="btn-som-mini bg-red-600 text-white shadow-xl">
    🔇
</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyD0PhZe0AuMTA14W8vzsfn4evxBBLzh4sw", 
        authDomain: "bingodocau.firebaseapp.com", 
        projectId: "bingodocau",
        databaseURL: "https://bingodocau-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);

    let bingoId = null;
    let vozAtiva = false;
    let ultimaBolaAnunciada = "";
    let ultimoAlertaQuantidade = 0;
    let letrasAtuais = ["B","I","N","G","O"];

    function falar(t) { 
        if(!vozAtiva) return;
        window.speechSynthesis.cancel(); 
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'pt-BR'; 
        window.speechSynthesis.speak(m); 
    }

    async function init() {
        const conf = await getDoc(doc(db, "configuracoes", "vendas"));
        if (!conf.exists()) return;
        bingoId = conf.data().bingoAtivo;

        onSnapshot(doc(db, "bingos", "bingo_" + bingoId), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById("nomeBingo").innerText = d.nome || "BINGO";
                document.getElementById("local").innerText = d.local || "---";
                document.getElementById("data").innerText = d.data || "--/--/--";
                
                const novasLetras = d.letras ? (Array.isArray(d.letras) ? d.letras : d.letras.split("")) : ["B","I","N","G","O"];
                if (JSON.stringify(novasLetras) !== JSON.stringify(letrasAtuais)) {
                    letrasAtuais = novasLetras;
                    montarGrade();
                }
            }
        });

        // MONITORAMENTO COM RESET AUTOMÁTICO
        onValue(ref(rtdb, 'live'), (snapshot) => {
            const dados = snapshot.val();
            if (dados) {
                atualizarInterface(dados);
            } else {
                // Limpa o telão instantaneamente ao detectar o Reset no banco
                document.getElementById("contador").innerText = "00";
                document.getElementById("ultima").innerText = "--";
                document.getElementById("quase").innerHTML = "";
                document.getElementById("ganhadores").innerHTML = "";
                document.getElementById("painelGanhador").classList.add("hidden");
                document.querySelectorAll('[id^="n"]').forEach(el => el.classList.remove("marcado"));
                ultimaBolaAnunciada = "";
                ultimoAlertaQuantidade = 0;
            }
        });
    }

    function montarGrade() {
        const grade = document.getElementById("grade");
        grade.innerHTML = "";
        letrasAtuais.forEach((letra, colIndex) => {
            const lDiv = document.createElement("div");
            lDiv.className = "bg-slate-700 h-7 md:h-9 flex items-center justify-center rounded font-black text-green-500 text-[10px] md:text-sm border border-slate-600";
            lDiv.innerText = letra;
            grade.appendChild(lDiv);

            for (let n = (colIndex * 15) + 1; n <= (colIndex * 15) + 15; n++) {
                const nDiv = document.createElement("div");
                nDiv.id = `n${n}`;
                nDiv.className = "bg-slate-900/50 h-7 md:h-9 flex items-center justify-center rounded font-bold text-slate-600 text-[9px] md:text-xs border border-slate-700";
                nDiv.innerText = n;
                grade.appendChild(nDiv);
            }
        });
    }

    function atualizarInterface(dados) {
        const qtdSorteados = dados.sorteados ? dados.sorteados.length : 0;
        document.getElementById("contador").innerText = qtdSorteados.toString().padStart(2, '0');
        document.getElementById("ultima").innerText = dados.ultima || "--";

        if (dados.ultima && dados.ultima !== "--" && dados.ultima !== ultimaBolaAnunciada) {
            ultimaBolaAnunciada = dados.ultima;
            falar(dados.ultima.replace("-", " "));
        }

        const alertas = [40, 50, 60, 70];
        if (alertas.includes(qtdSorteados) && qtdSorteados !== ultimoAlertaQuantidade) {
            ultimoAlertaQuantidade = qtdSorteados;
            setTimeout(() => { falar(`Atenção, já foram sorteadas ${qtdSorteados} bolas.`); }, 2000);
        }

        document.querySelectorAll('[id^="n"]').forEach(el => el.classList.remove("marcado"));
        if(dados.sorteados) {
            dados.sorteados.forEach(n => document.getElementById(`n${n}`)?.classList.add("marcado"));
        }

        document.getElementById("ganhadores").innerHTML = (dados.ganhadores || []).map(g => `
            <tr class="border-b border-slate-700"><td class="py-1">${g.lugar}º</td><td class="py-1 px-2">CART. ${g.cartela}</td><td class="py-1 uppercase">${g.nome}</td></tr>
        `).join("");

        document.getElementById("quase").innerHTML = (dados.armadas || []).map(a => `
            <span class="bg-red-600 text-white px-2 py-1 rounded shadow-sm font-bold text-[10px]">#${a}</span>
        `).join("");

        const painelG = document.getElementById("painelGanhador");
        if (dados.ganhadores && dados.ganhadores.length > 0) {
            const ultimoG = dados.ganhadores[dados.ganhadores.length - 1];
            if (ultimoG.totalBolas === qtdSorteados) {
                painelG.classList.remove("hidden");
            } else {
                painelG.classList.add("hidden");
            }
        } else {
            painelG.classList.add("hidden");
        }
    }

    document.getElementById("btnAtivarSom").onclick = (e) => {
        vozAtiva = !vozAtiva;
        e.currentTarget.innerText = vozAtiva ? "🔊" : "🔇";
        e.currentTarget.classList.toggle("bg-green-600", vozAtiva);
        e.currentTarget.classList.toggle("bg-red-600", !vozAtiva);
    };

    init();
</script>
</body>
</html>
