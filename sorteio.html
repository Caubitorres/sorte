<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio Bingo - Painel Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .marcado { background-color: #22c55e !important; color: white !important; font-weight: bold; transform: scale(1.05); }
        .grid-bingo { display: grid; grid-template-columns: repeat(16, minmax(0, 1fr)); gap: 4px; margin-bottom: 4px; }
        .alerta-armada { border: 5px solid #ef4444 !important; background-color: #fef2f2 !important; animation: pulse 1s infinite; }
        .alerta-ganhador { border: 5px solid #16a34a !important; background-color: #f0fdf4 !important; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .lista-scroll { max-height: 300px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 4px; }
    </style>
</head>

<body class="bg-gray-200 font-sans">

<div class="max-w-7xl mx-auto p-2 md:p-4">
    <div class="bg-white p-3 rounded shadow mb-3 flex flex-wrap justify-between items-center">
        <div>
            <h1 id="nomeBingo" class="text-xl md:text-2xl font-bold">BINGO</h1>
            <div class="text-xs text-gray-600">
                📍 <span id="local">--</span> | 📅 <span id="data">--</span> | ⏰ <span id="hora">--</span>
            </div>
        </div>
        <div class="flex gap-4 text-sm font-bold">
            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="somentePagas"> Somente pagas</label>
            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="incluirLivres"> Incluir livres</label>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-3">
        <div class="lg:w-2/3">
            <div id="painelSorteio" class="bg-white p-4 rounded shadow mb-3 transition-all duration-300">
                <div class="flex flex-wrap gap-2 mb-4">
                    <button id="btnSortear" class="bg-green-600 text-white px-4 py-2 rounded font-bold shadow">Sortear</button>
                    <button id="btnResetar" class="bg-red-600 text-white px-4 py-2 rounded shadow">Reset</button>
                    <button id="btnSom" class="bg-blue-600 text-white px-4 py-2 rounded shadow">Som: OFF</button>
                    <button id="btnRepetir" class="bg-purple-600 text-white px-4 py-2 rounded shadow">🔊 Repetir</button>
                    <button id="btnSalvar" class="bg-gray-800 text-white px-4 py-2 rounded font-bold shadow">💾 Salvar</button>
                </div>

                <div class="flex flex-col items-center justify-center min-h-[160px]">
                    <div id="msgAlerta" class="hidden font-black text-2xl mb-2 uppercase text-center"></div>
                    <div id="ultima" class="text-8xl md:text-9xl font-black text-green-600">--</div>
                    <div id="contador" class="text-sm font-bold text-gray-400 mt-2">0 bolas sorteadas</div>
                </div>
            </div>

            <div class="bg-white p-3 rounded shadow">
                <div id="grade"></div>
            </div>
        </div>

        <div class="lg:w-1/3 flex flex-col gap-3">
            <div class="bg-yellow-50 p-3 rounded shadow">
                <h3 class="font-bold text-sm mb-2 text-yellow-800 uppercase flex justify-between">
                    🔥 Cartelas Armadas <span id="numArmadas" class="bg-yellow-500 text-white px-2 rounded-full text-xs">0</span>
                </h3>
                <div id="quase" class="lista-scroll bg-white p-2 text-xs space-y-1"></div>
            </div>

            <div class="bg-white p-3 rounded shadow">
                <h3 class="font-bold text-sm mb-2 text-green-800 uppercase">🏆 Ganhadores</h3>
                <div class="lista-scroll">
                    <table class="w-full text-xs">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr class="border-b">
                                <th class="p-2 w-10">Pos</th>
                                <th class="p-2 w-12">Bola</th>
                                <th class="p-2 w-12">Cart</th>
                                <th class="p-2 text-left">Nome</th>
                            </tr>
                        </thead>
                        <tbody id="ganhadores"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...", 
  authDomain: "bingodocau.firebaseapp.com",
  projectId: "bingodocau",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cartelas = [];
let sorteados = [];
let bingoId = null;
let somAtivo = false;
let ultimaChamada = "";
let ganhadoresLista = [];
let letrasCustom = ["B","I","N","G","O"];

async function init() {
    const conf = await getDoc(doc(db, "configuracoes", "vendas"));
    if (!conf.exists()) return;
    bingoId = conf.data().bingoAtivo;
    const bingo = await getDoc(doc(db, "bingos", "bingo_" + bingoId));
    if (bingo.exists()) {
        const d = bingo.data();
        document.getElementById("nomeBingo").innerText = d.nome || "BINGO";
        document.getElementById("local").innerText = d.local || "--";
        document.getElementById("data").innerText = d.data || "--";
        document.getElementById("hora").innerText = d.hora || "--";
        if (d.letras && d.letras.length === 5) letrasCustom = Array.isArray(d.letras) ? d.letras : d.letras.split("");
    }
    gerarGrade();
    await carregarCartelas();
    enviarParaConferencia(false, []);
}

function gerarGrade() {
    const grade = document.getElementById("grade");
    grade.innerHTML = "";
    let n = 1;
    letrasCustom.forEach(l => {
        const row = document.createElement("div");
        row.className = "grid-bingo";
        const label = document.createElement("div");
        label.className = "flex items-center justify-center bg-gray-800 text-white font-bold text-xs h-8";
        label.innerText = l;
        row.appendChild(label);
        for (let i = 0; i < 15; i++) {
            const d = document.createElement("div");
            d.id = `n${n}`;
            d.className = "flex items-center justify-center border text-xs h-8 bg-white transition-all";
            d.innerText = n;
            row.appendChild(d);
            n++;
        }
        grade.appendChild(row);
    });
}

async function carregarCartelas() {
    const snap = await getDocs(collection(db, "bingos", "bingo_" + bingoId, "cartelas"));
    cartelas = snap.docs.map(doc => {
        const c = doc.data();
        return {
            ...c,
            status: (c.status || "livre").toLowerCase(),
            nums: [...(c.b||[]), ...(c.i||[]), ...(c.n_col||[]), ...(c.g||[]), ...(c.o||[])],
            jaGanhou: false
        };
    });
}

function sortear() {
    const todos = Array.from({length: 75}, (_, i) => i + 1);
    const disponiveis = todos.filter(x => !sorteados.includes(x));
    if (disponiveis.length === 0) return alert("Fim do sorteio!");

    const n = disponiveis[Math.floor(Math.random() * disponiveis.length)];
    sorteados.push(n);

    const letra = letrasCustom[Math.floor((n - 1) / 15)];
    ultimaChamada = `${letra} ${n}`;
    document.getElementById("ultima").innerText = `${letra}-${n}`;
    document.getElementById("contador").innerText = `${sorteados.length} bolas sorteadas`;

    const el = document.getElementById(`n${n}`);
    if (el) el.classList.add("marcado");

    falar(ultimaChamada);

    if([40, 50, 60, 70].includes(sorteados.length)){
        falar("Foram chamadas " + sorteados.length + " bolas");
    }

    verificar(letra, n);
}

function verificar(letra, n) {
    const filtroPagas = document.getElementById("somentePagas").checked;
    const filtroLivres = document.getElementById("incluirLivres").checked;
    const ativas = cartelas.filter(c => {
        if (!filtroLivres && (c.status === "livre" || c.status === "disponivel")) return false;
        if (filtroPagas && c.status !== "paga") return false;
        return true;
    });

    let temArmada = false;
    let temGanhador = false;
    let listaArmadasLocal = [];
    const quaseDiv = document.getElementById("quase");
    quaseDiv.innerHTML = "";

    ativas.forEach(c => {
        if (c.jaGanhou) return;
        const acertos = c.nums.filter(x => sorteados.includes(x)).length;
        if (acertos === 24) {
            temArmada = true;
            listaArmadasLocal.push(c.n);
            quaseDiv.innerHTML += `<div class="p-1 border-b font-bold text-red-600">#${c.n} - ${c.comprador || 'Livre'}</div>`;
        }
        if (acertos === 25) {
            c.jaGanhou = true;
            temGanhador = true;
            ganhadoresLista.push({
                ordem: ganhadoresLista.length + 1,
                bola: `${letra}-${n}`,
                cartela: c.n,
                nome: (c.comprador || "---").toUpperCase()
            });
            renderGanhadores();
        }
    });

    const painel = document.getElementById("painelSorteio");
    const msg = document.getElementById("msgAlerta");
    painel.classList.remove("alerta-armada", "alerta-ganhador");
    msg.classList.add("hidden");

    if (temGanhador) {
        painel.classList.add("alerta-ganhador");
        msg.innerText = "🏆 TEMOS GANHADOR! 🏆";
        msg.className = "font-black text-2xl mb-2 text-green-700 uppercase block";
        msg.classList.remove("hidden");
    } else if (temArmada) {
        painel.classList.add("alerta-armada");
        msg.innerText = "⚠️ CARTELA ARMADA! ⚠️";
        msg.className = "font-black text-2xl mb-2 text-red-600 uppercase block";
        msg.classList.remove("hidden");
    }
    document.getElementById("numArmadas").innerText = listaArmadasLocal.length;

    enviarParaConferencia(temGanhador, listaArmadasLocal);
}

function enviarParaConferencia(vitoria, armadas) {
    const dados = {
        nome: document.getElementById("nomeBingo").innerText,
        local: document.getElementById("local").innerText,
        data: document.getElementById("data").innerText,
        sorteados: sorteados,
        ultima: document.getElementById("ultima").innerText,
        ganhadores: ganhadoresLista,
        temGanhador: vitoria,
        armadas: armadas
    };
    localStorage.setItem('bingo_live_update', JSON.stringify(dados));
}

function renderGanhadores() {
    const tbody = document.getElementById("ganhadores");
    tbody.innerHTML = ganhadoresLista.map(g => `
        <tr class="border-b bg-green-50">
            <td class="p-2 text-center font-bold">${g.ordem}º</td>
            <td class="p-2 text-center">${g.bola}</td>
            <td class="p-2 text-center font-bold">${g.cartela}</td>
            <td class="p-2 truncate font-bold text-green-800">${g.nome}</td>
        </tr>
    `).join("");
}

function falar(t) {
    if (!somAtivo) return;
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

document.getElementById("btnSortear").addEventListener("click", sortear);

document.getElementById("btnSalvar").addEventListener("click", () => {
    const dataHora = new Date().toLocaleString('pt-BR');
    const nomeB = document.getElementById("nomeBingo").innerText;
    
    let txt = `==========================================\n`;
    txt += `   RELATÓRIO FINAL - ${nomeB}\n`;
    txt += `==========================================\n`;
    txt += `Data/Hora: ${dataHora}\n`;
    txt += `Local: ${document.getElementById("local").innerText}\n`;
    txt += `Total de Bolas Sorteadas: ${sorteados.length}\n`;
    txt += `------------------------------------------\n\n`;
    
    txt += `SEQUÊNCIA DAS BOLAS (Ordem de saída):\n`;
    txt += sorteados.join(" - ") + `\n\n`;
    
    txt += `------------------------------------------\n`;
    txt += `🏆 LISTA DE GANHADORES:\n`;
    txt += `------------------------------------------\n`;
    
    if (ganhadoresLista.length === 0) {
        txt += `Nenhum ganhador registrado.\n`;
    } else {
        ganhadoresLista.forEach(g => {
            txt += `${g.ordem}º GANHADOR:\n`;
            txt += `   - Nome: ${g.nome}\n`;
            txt += `   - Cartela: #${g.cartela}\n`;
            txt += `   - Bola da Vitória: ${g.bola}\n`;
            txt += `------------------------------------------\n`;
        });
    }

    const blob = new Blob([txt], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `Relatorio_Bingo_${nomeB.replace(/\s+/g, '_')}.txt`;
    link.click();
});

document.getElementById("btnRepetir").addEventListener("click", () => falar(ultimaChamada));
document.getElementById("btnSom").addEventListener("click", (e) => {
    somAtivo = !somAtivo;
    e.target.innerText = somAtivo ? "Som: ON" : "Som: OFF";
    e.target.classList.toggle("bg-green-600", somAtivo);
});
document.getElementById("btnResetar").addEventListener("click", () => {
    if(confirm("Reiniciar sorteio?")) {
        localStorage.removeItem('bingo_live_update');
        location.reload();
    }
});

init();
</script>
</body>
</html>
