<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio - FACUC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .shake-anim { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-6 overflow-hidden">

    <div class="text-center mb-6">
        <h1 id="titulo-instrucao" class="text-xl font-black italic uppercase text-blue-400">Clique para Iniciar o Sensor</h1>
    </div>

    <button id="btnAtivar" class="mb-8 bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-black text-sm uppercase shadow-lg transition-all active:scale-95">
        Ativar Sorteio por Balanço
    </button>

    <div id="globo" class="relative w-64 h-64 bg-slate-800 rounded-full border-8 border-slate-700 flex items-center justify-center shadow-[0_0_50px_rgba(37,99,235,0.2)]">
        <div id="numero-display" class="text-8xl font-black italic tracking-tighter">--</div>
    </div>

    <!-- LOG DE TESTE: Se os números aqui mudarem quando você mexe o celular, o sensor está OK -->
    <div id="debug" class="mt-4 text-[8px] text-slate-600 font-mono uppercase">Força G: 0.00</div>

    <div id="status" class="mt-6 text-slate-500 font-bold uppercase text-[10px] tracking-widest text-center">
        Aguardando ativação...
    </div>

    <script>
        let pedrasRestantes = Array.from({length: 75}, (_, i) => i + 1);
        let sorteando = false;
        let ultimoSorteio = 0;

        const btnAtivar = document.getElementById('btnAtivar');
        const status = document.getElementById('status');
        const display = document.getElementById('numero-display');
        const globo = document.getElementById('globo');
        const debug = document.getElementById('debug');

        async function ativarSensores() {
            try {
                // Tenta ativar a escuta de movimento
                window.addEventListener('devicemotion', (event) => {
                    const acc = event.accelerationIncludingGravity;
                    if (!acc) {
                        status.innerText = "ERRO: ACELERÔMETRO NÃO ENCONTRADO";
                        return;
                    }

                    const forcaG = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
                    
                    // Mostra o valor em tempo real para teste
                    debug.innerText = "Força G: " + forcaG.toFixed(2);

                    // SENSIBILIDADE REDUZIDA: Mude de 18 para 12 para ficar mais fácil de disparar
                    if (forcaG > 14 && !sorteando) {
                        const agora = Date.now();
                        if (agora - ultimoSorteio > 4000) { 
                            sortear();
                            ultimoSorteio = agora;
                        }
                    }
                });
                
                btnAtivar.classList.add('hidden');
                document.getElementById('titulo-instrucao').innerText = "Balance o celular!";
                status.innerText = "SENSOR PRONTO";
                if (navigator.vibrate) navigator.vibrate(200);

            } catch (erro) {
                status.innerText = "ERRO AO ATIVAR";
            }
        }

        function sortear() {
            if (pedrasRestantes.length === 0) {
                status.innerText = "FIM DO BINGO!";
                return;
            }

            sorteando = true;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            globo.classList.add('shake-anim');
            status.innerText = "SORTEANDO...";

            let tempoAnimacao = 0;
            const intervalo = setInterval(() => {
                display.innerText = Math.floor(Math.random() * 75) + 1;
                tempoAnimacao++;

                if (tempoAnimacao > 15) {
                    clearInterval(intervalo);
                    const index = Math.floor(Math.random() * pedrasRestantes.length);
                    const numero = pedrasRestantes.splice(index, 1)[0];
                    display.innerText = numero;
                    display.classList.add('text-blue-500');
                    globo.classList.remove('shake-anim');
                    if (navigator.vibrate) navigator.vibrate(500);
                    setTimeout(() => {
                        sorteando = false;
                        display.classList.remove('text-blue-500');
                        status.innerText = "AGUARDANDO NOVO BALANÇO...";
                    }, 3000); 
                }
            }, 70);
        }

        btnAtivar.addEventListener('click', ativarSensores);
    </script>
</body>
</html>
