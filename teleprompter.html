<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Teleprompter V6 - Velocidade Adaptativa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { overflow: hidden; background-color: #000; color: #fff; }
        .mirror-x { transform: scaleX(-1); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col font-sans select-none">

    <!-- PAINEL DE CONFIGURAÇÃO -->
    <div id="setup-panel" class="p-6 bg-zinc-900 border-b border-zinc-800 flex flex-col gap-4 z-50">
        <h1 class="text-xl font-bold text-amber-400">OBS Teleprompter V6 - Velocidade Adaptativa</h1>
        
        <textarea id="script-input" class="w-full h-32 p-3 bg-zinc-800 text-white rounded border border-zinc-700 focus:outline-none focus:border-amber-400" placeholder="Cole seu roteiro aqui...">Cole seu roteiro aqui. O algoritmo agora vai ouvir o ritmo da sua voz. Se você falar mais rápido, a tela acelera. Se você falar mais devagar ou pausar, a tela diminui a velocidade automaticamente para se adequar perfeitamente ao seu ritmo.</textarea>
        
        <div class="flex flex-wrap gap-4 items-center justify-between text-sm">
            <div class="flex gap-4 flex-wrap">
                <label>Fonte: <input type="number" id="font-size" value="44" class="w-16 bg-zinc-800 p-1 rounded text-center"> px</label>
                <label>Margem: <input type="number" id="margin-size" value="20" class="w-16 bg-zinc-800 p-1 rounded text-center"> %</label>
                <label>Velocidade Base: <input type="number" id="speed-input" value="1.5" step="0.1" class="w-16 bg-zinc-800 p-1 rounded text-center"></label>
            </div>
            
            <div class="flex gap-3">
                <button id="btn-mirror-x" class="px-3 py-1 bg-zinc-800 rounded hover:bg-zinc-700">Espelhar X</button>
            </div>
        </div>

        <button id="btn-start" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-bold py-2 rounded transition-colors cursor-pointer">
            Iniciar Prompter Adaptativo
        </button>
    </div>

    <!-- ÁREA DO PROMPTER -->
    <div class="relative flex-1 w-full overflow-hidden flex items-center justify-center">
        <div id="center-indicator" class="absolute left-0 right-0 h-24 border-t border-b border-dashed border-amber-500/20 bg-amber-500/5 pointer-events-none z-40"></div>

        <div id="prompter-viewport" class="w-full h-full overflow-y-scroll" style="padding-top: 42vh; padding-bottom: 60vh;">
            <div id="prompter-text" class="mx-auto text-center font-medium leading-relaxed break-words tracking-wide whitespace-pre-wrap"></div>
        </div>
    </div>

    <!-- BARRA DE STATUS -->
    <div id="status-bar" class="hidden fixed bottom-0 left-0 right-0 bg-zinc-950/95 p-2 text-xs text-zinc-400 justify-between items-center z-50">
        <div id="status-mode-text">Analisando ritmo da voz...</div>
        <div class="flex items-center gap-2">
            <span>Velocidade IA Atual:</span>
            <span id="current-speed-display" class="text-amber-400 font-bold">1.5</span>
        </div>
        <div>[Espaço] Play/Pause | [Esc] Sair | [Setas ↑ ↓] Ajuste Manual Fino</div>
    </div>

    <script>
        const setupPanel = document.getElementById('setup-panel');
        const statusBar = document.getElementById('status-bar');
        const scriptInput = document.getElementById('script-input');
        const prompterViewport = document.getElementById('prompter-viewport');
        const prompterText = document.getElementById('prompter-text');
        const statusModeText = document.getElementById('status-mode-text');
        const currentSpeedDisplay = document.getElementById('current-speed-display');
        
        const btnStart = document.getElementById('btn-start');
        const btnMirrorX = document.getElementById('btn-mirror-x');
        const fontSizeInput = document.getElementById('font-size');
        const marginSizeInput = document.getElementById('margin-size');
        const speedInput = document.getElementById('speed-input');

        let isRunning = false;
        let isPlaying = false; 
        let scrollSpeed = 1.5;
        let baseSpeed = 1.5;
        let mirrorX = false;
        let animationFrameId = null;

        let recognition = null;
        let lastSpeechTimestamp = Date.now();

        btnStart.addEventListener('click', () => {
            const rawText = scriptInput.value.trim();
            if(!rawText) return alert("Por favor, digite um texto.");

            prompterText.textContent = rawText;
            prompterText.style.fontSize = `${fontSizeInput.value}px`;
            prompterText.style.paddingLeft = `${marginSizeInput.value}%`;
            prompterText.style.paddingRight = `${marginSizeInput.value}%`;
            
            baseSpeed = parseFloat(speedInput.value);
            scrollSpeed = baseSpeed;
            currentSpeedDisplay.innerText = scrollSpeed.toFixed(1);

            setupPanel.classList.add('hidden');
            statusBar.classList.remove('hidden');
            statusBar.classList.add('flex');
            
            prompterViewport.scrollTop = 0;
            isRunning = true;
            isPlaying = true;

            initAdaptiveVoice();
            tick();
        });

        // Motor de rolagem contínuo e estável
        function tick() {
            if (!isRunning) return;

            if (isPlaying) {
                // Se a pessoa parar de falar por mais de 1.5 segundos, desacelera gradualmente até parar
                const timeSinceLastSpeech = Date.now() - lastSpeechTimestamp;
                if (timeSinceLastSpeech > 1500) {
                    scrollSpeed = Math.max(0, scrollSpeed - 0.05); // Desaceleração suave
                    statusModeText.innerText = "⏸️ Pausando por silêncio...";
                }
                
                prompterViewport.scrollTop += scrollSpeed / 2;
                currentSpeedDisplay.innerText = scrollSpeed.toFixed(1);
            }

            animationFrameId = requestAnimationFrame(tick);
        }

        // Lógica de adaptação de velocidade baseada no fluxo de fala
        function initAdaptiveVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusModeText.innerText = "❌ Navegador não suporta IA de voz.";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                statusModeText.innerText = "🎙️ Modo Adaptativo Ativo. Sincronizando com sua voz...";
            };

            recognition.onresult = (event) => {
                lastSpeechTimestamp = Date.now();
                
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    interimTranscript += event.results[i][0].transcript;
                }

                // Conta quantas palavras foram processadas no último bloco de fala
                const wordsCount = interimTranscript.trim().split(/\s+/).filter(w => w.length > 0).length;

                if (wordsCount > 0) {
                    // SEGREDO DO CÁLCULO:
                    // Se você está falando muitas palavras de uma vez só, a IA aumenta temporariamente a velocidade.
                    // Se falar poucas palavras, ela mantém perto da velocidade base estável.
                    if (wordsCount > 4) {
                        scrollSpeed = Math.min(baseSpeed * 2.2, scrollSpeed + 0.12); // Acelera se estiver falando rápido
                        statusModeText.innerText = "⚡ Você acelerou! Ajustando prompter...";
                    } else {
                        scrollSpeed = Math.max(baseSpeed * 0.6, scrollSpeed - 0.08); // Desacelera se o fluxo diminuir
                        statusModeText.innerText = "🐢 Ritmo calmo. Ajustando prompter...";
                    }
                    isPlaying = true;
                }
            };

            recognition.onend = () => {
                if (isPlaying && isRunning) {
                    try { recognition.start(); } catch(e) {}
                }
            };

            recognition.start();
        }

        // Controles manuais de emergência caso queira reajustar no meio
        window.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            if (e.code === 'Space') {
                e.preventDefault();
                isPlaying = !isPlaying;
                if(!isPlaying) {
                    scrollSpeed = 0;
                    statusModeText.innerText = "⏸️ Pausado Manualmente";
                } else {
                    scrollSpeed = baseSpeed;
                }
            }
            
            if (e.code === 'Escape') {
                isRunning = false;
                isPlaying = false;
                cancelAnimationFrame(animationFrameId);
                if (recognition) recognition.stop();
                setupPanel.classList.remove('hidden');
                statusBar.classList.add('hidden');
            }

            if (e.code === 'ArrowUp') {
                e.preventDefault();
                baseSpeed = Math.min(15, baseSpeed + 0.2);
                scrollSpeed = baseSpeed;
            }

            if (e.code === 'ArrowDown') {
                e.preventDefault();
                baseSpeed = Math.max(0.2, baseSpeed - 0.2);
                scrollSpeed = baseSpeed;
            }
        });

        btnMirrorX.addEventListener('click', () => {
            mirrorX = !mirrorX;
            prompterViewport.classList.toggle('mirror-x', mirrorX);
            btnMirrorX.classList.toggle('bg-amber-500', mirrorX);
            btnMirrorX.classList.toggle('text-black', mirrorX);
        });
    </script>
</body>
</html>
