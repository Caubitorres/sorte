<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Teleprompter Smart Voice V4 Anti-Pulo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { overflow: hidden; background-color: #000; color: #fff; }
        .mirror-x { transform: scaleX(-1); }
        .word-highlight { color: #f59e0b; font-weight: bold; background-color: rgba(245, 158, 11, 0.1); border-radius: 4px; transition: all 0.15s ease-in-out; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col font-sans select-none">

    <div id="setup-panel" class="p-6 bg-zinc-900 border-b border-zinc-800 flex flex-col gap-4 z-50">
        <h1 class="text-xl font-bold text-amber-400">OBS Teleprompter V4 Anti-Pulo</h1>
        
        <textarea id="script-input" class="w-full h-32 p-3 bg-zinc-800 text-white rounded border border-zinc-700 focus:outline-none focus:border-amber-400" placeholder="Cole seu roteiro aqui...">Seu texto aparecerá aqui palavra por palavra assim que você começar a falar perto do microfone.</textarea>
        
        <div class="flex flex-wrap gap-4 items-center justify-between text-sm">
            <div class="flex gap-4">
                <label>Fonte: <input type="number" id="font-size" value="44" class="w-16 bg-zinc-800 p-1 rounded text-center"> px</label>
                <label>Margem: <input type="number" id="margin-size" value="25" class="w-16 bg-zinc-800 p-1 rounded text-center"> %</label>
            </div>
            
            <div class="flex gap-3">
                <button id="btn-mirror-x" class="px-3 py-1 bg-zinc-800 rounded hover:bg-zinc-700">Espelhar X</button>
                <button id="btn-mode" class="px-3 py-1 bg-zinc-800 rounded border border-green-500 text-green-400 font-semibold">Modo: Voz (IA Ativa)</button>
            </div>
        </div>

        <button id="btn-start" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-bold py-2 rounded transition-colors cursor-pointer">
            Iniciar Prompter
        </button>
    </div>

    <div class="relative flex-1 w-full overflow-hidden flex items-center justify-center">
        <div id="center-indicator" class="absolute left-0 right-0 h-24 border-t border-b border-dashed border-amber-500/30 bg-amber-500/5 pointer-events-none z-40"></div>

        <div id="prompter-viewport" class="w-full h-full overflow-y-scroll scroll-smooth" style="padding-top: 40vh; padding-bottom: 60vh;">
            <div id="prompter-text" class="mx-auto text-center font-medium leading-relaxed break-words tracking-wide"></div>
        </div>
    </div>

    <div id="status-bar" class="hidden fixed bottom-0 left-0 right-0 bg-zinc-950/90 p-2 text-xs text-zinc-400 justify-between items-center z-50">
        <div id="status-mode-text">Aguardando microfone...</div>
        <div>[Espaço] Play/Pause | [Esc] Sair</div>
    </div>

    <script>
        const setupPanel = document.getElementById('setup-panel');
        const statusBar = document.getElementById('status-bar');
        const scriptInput = document.getElementById('script-input');
        const prompterViewport = document.getElementById('prompter-viewport');
        const prompterText = document.getElementById('prompter-text');
        const statusModeText = document.getElementById('status-mode-text');
        
        const btnStart = document.getElementById('btn-start');
        const btnMirrorX = document.getElementById('btn-mirror-x');
        const btnMode = document.getElementById('btn-mode');
        const fontSizeInput = document.getElementById('font-size');
        const marginSizeInput = document.getElementById('margin-size');

        let isRunning = false;
        let isPlaying = false;
        let useVoiceMode = true; 
        let scrollSpeed = 2; 
        let animationFrameId = null;
        let mirrorX = false;

        let recognition = null;
        let wordsArray = [];
        let currentWordIndex = 0;

        btnMode.addEventListener('click', () => {
            useVoiceMode = !useVoiceMode;
            if (useVoiceMode) {
                btnMode.innerText = "Modo: Voz (IA Ativa)";
                btnMode.className = "px-3 py-1 bg-zinc-800 rounded border border-green-500 text-green-400 font-semibold";
            } else {
                btnMode.innerText = "Modo: Tempo Fixo";
                btnMode.className = "px-3 py-1 bg-zinc-800 rounded border border-blue-500 text-blue-400 font-semibold";
            }
        });

        function cleanString(str) {
            return str.toLowerCase()
              .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
              .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g,"")
              .trim();
        }

        btnStart.addEventListener('click', () => {
            const rawText = scriptInput.value.trim();
            if(!rawText) return alert("Por favor, digite um texto.");

            wordsArray = rawText.split(/\s+/).filter(w => w.length > 0);
            prompterText.innerHTML = wordsArray.map((word, id) => `<span id="word-${id}" class="inline-block mx-1 transition-all duration-150">${word}</span>`).join(' ');

            prompterText.style.fontSize = `${fontSizeInput.value}px`;
            prompterText.style.paddingLeft = `${marginSizeInput.value}%`;
            prompterText.style.paddingRight = `${marginSizeInput.value}%`;

            setupPanel.classList.add('hidden');
            statusBar.classList.remove('hidden');
            statusBar.classList.add('flex');
            
            prompterViewport.scrollTop = 0;
            currentWordIndex = 0;
            isRunning = true;
            isPlaying = true;

            if (useVoiceMode) {
                statusModeText.innerText = "🎙️ Modo Voz Ativo.";
                initVoiceRecognition();
            } else {
                statusModeText.innerText = "⏱️ Modo Tempo Fixo.";
                startScrollByTime();
            }
        });

        function startScrollByTime() {
            if (!isPlaying || useVoiceMode) return;
            prompterViewport.scrollTop += scrollSpeed / 2;
            animationFrameId = requestAnimationFrame(startScrollByTime);
        }

        function initVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Navegador incompatível.");

            if(recognition) { recognition.abort(); }

            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    transcript += event.results[i][0].transcript;
                }

                const spokenWordsCleaned = transcript.toLowerCase()
                    .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, " ")
                    .split(/\s+/)
                    .filter(w => w.length > 0)
                    .map(cleanString);

                for (let sw of spokenWordsCleaned) {
                    // ESTRATÉGIA ANTI-PULO: Ignorar palavras muito curtas de conexão (de, o, a, que, em...)
                    if (sw.length <= 3) continue; 

                    // Busca focada: varre apenas as próximas 20 palavras do roteiro
                    for (let i = currentWordIndex; i < Math.min(currentWordIndex + 20, wordsArray.length); i++) {
                        const scriptWordClean = cleanString(wordsArray[i]);
                        
                        if (scriptWordClean === sw || scriptWordClean.includes(sw)) {
                            highlightAndScrollToWord(i);
                            break;
                        }
                    }
                }
            };

            recognition.onend = () => {
                if (isPlaying && useVoiceMode && isRunning) {
                    try { recognition.start(); } catch(e) {}
                }
            };

            recognition.start();
        }

        function highlightAndScrollToWord(index) {
            const prevWord = document.getElementById(`word-${currentWordIndex}`);
            if (prevWord) prevWord.classList.remove('word-highlight');

            currentWordIndex = index;
            
            const currentWordEl = document.getElementById(`word-${index}`);
            if (currentWordEl) {
                currentWordEl.classList.add('word-highlight');
                const offsetTarget = currentWordEl.offsetTop - (prompterViewport.clientHeight * 0.35);
                prompterViewport.scrollTo({ top: offsetTarget, behavior: 'smooth' });
            }
        }

        window.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            if (e.code === 'Space') {
                e.preventDefault();
                isPlaying = !isPlaying;
                if (isPlaying) {
                    if (useVoiceMode) initVoiceRecognition();
                    else startScrollByTime();
                } else {
                    if (recognition) recognition.stop();
                    cancelAnimationFrame(animationFrameId);
                }
            }
            
            if (e.code === 'Escape') {
                isPlaying = false;
                isRunning = false;
                if (recognition) recognition.stop();
                cancelAnimationFrame(animationFrameId);
                setupPanel.classList.remove('hidden');
                statusBar.classList.add('hidden');
            }
        });

        btnMirrorX.addEventListener('click', () => {
            mirrorX = !mirrorX;
            prompterViewport.classList.toggle('mirror-x', mirrorX);
            btnMirrorX.classList.toggle('bg-amber-500', mirrorX);
            btnMirrorX.classList.toggle('text-black', mirrorX);
        });
    </script>
</body>
</html>
