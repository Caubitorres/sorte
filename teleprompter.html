<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Teleprompter V6.1 - Calibrado</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { overflow: hidden; background-color: #000; color: #fff; }
        .mirror-x { transform: scaleX(-1); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col font-sans select-none">

    <!-- PAINEL DE CONFIGURAÇÃO -->
    <div id="setup-panel" class="p-6 bg-zinc-900 border-b border-zinc-800 flex flex-col gap-4 z-50">
        <h1 class="text-xl font-bold text-amber-400">OBS Teleprompter V6.1 - Ritmo Calibrado</h1>
        
        <textarea id="script-input" class="w-full h-32 p-3 bg-zinc-800 text-white rounded border border-zinc-700 focus:outline-none focus:border-amber-400" placeholder="Cole seu roteiro aqui...">Cole seu roteiro aqui. Esta versão foi calibrada com um teto de segurança. Mesmo que você acelere muito a fala, o texto tem um limite máximo de velocidade para nunca sumir da tela, mantendo uma transição suave e amortecida.</textarea>
        
        <div class="flex flex-wrap gap-4 items-center justify-between text-sm">
            <div class="flex gap-4 flex-wrap">
                <label>Fonte: <input type="number" id="font-size" value="44" class="w-16 bg-zinc-800 p-1 rounded text-center"> px</label>
                <label>Margem: <input type="number" id="margin-size" value="20" class="w-16 bg-zinc-800 p-1 rounded text-center"> %</label>
                <label>Velocidade Manual (Ideal): <input type="number" id="speed-input" value="1.4" step="0.1" class="w-16 bg-zinc-800 p-1 rounded text-center" title="Ajuste para a velocidade que você lê normalmente."></label>
            </div>
            
            <div class="flex gap-3">
                <button id="btn-mirror-x" class="px-3 py-1 bg-zinc-800 rounded hover:bg-zinc-700">Espelhar X</button>
            </div>
        </div>

        <button id="btn-start" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-bold py-2 rounded transition-colors cursor-pointer">
            Iniciar Prompter Calibrado
        </button>
    </div>

    <!-- ÁREA DO PROMPTER -->
    <div class="relative flex-1 w-full overflow-hidden flex items-center justify-center">
        <div id="center-indicator" class="absolute left-0 right-0 h-24 border-t border-b border-dashed border-amber-500/20 bg-amber-500/5 pointer-events-none z-40"></div>

        <div id="prompter-viewport" class="w-full h-full overflow-y-scroll" style="padding-top: 42vh; padding-bottom: 60vh;">
            <div id="prompter-text" class="mx-auto text-center font-medium leading-relaxed break-words tracking-wide whitespace-pre-wrap"></div>
        </div>
    </div>

    <!-- BARRA DE STATUS -->
    <div id="status-bar" class="hidden fixed bottom-0 left-0 right-0 bg-zinc-950/95 p-2 text-xs text-zinc-400 justify-between items-center z-50">
        <div id="status-mode-text">Sincronizando áudio...</div>
        <div class="flex items-center gap-2">
            <span>Velocidade Atual:</span>
            <span id="current-speed-display" class="text-amber-400 font-bold">1.4</span>
        </div>
        <div>[Espaço] Play/Pause | [Esc] Sair | [Setas ↑ ↓] Ajusta Velocidade Base</div>
    </div>

    <script>
        const setupPanel = document.getElementById('setup-panel');
        const statusBar = document.getElementById('status-bar');
        const scriptInput = document.getElementById('script-input');
        const prompterViewport = document.getElementById('prompter-viewport');
        const prompterText = document.getElementById('prompter-text');
        const statusModeText = document.getElementById('status-mode-text');
        const currentSpeedDisplay = document.getElementById('current-speed-display');
        
        const btnStart = document.getElementById('btn-start');
        const btnMirrorX = document.getElementById('btn-mirror-x');
        const fontSizeInput = document.getElementById('font-size');
        const marginSizeInput = document.getElementById('margin-size');
        const speedInput = document.getElementById('speed-input');

        let isRunning = false;
        let isPlaying = false; 
        let scrollSpeed = 1.4;
        let baseSpeed = 1.4;
        let targetSpeed = 1.4; // Velocidade que o algoritmo deseja alcançar
        let mirrorX = false;
        let animationFrameId = null;

        let recognition = null;
        let lastSpeechTimestamp = Date.now();

        btnStart.addEventListener('click', () => {
            const rawText = scriptInput.value.trim();
            if(!rawText) return alert("Por favor, digite um texto.");

            prompterText.textContent = rawText;
            prompterText.style.fontSize = `${fontSizeInput.value}px`;
            prompterText.style.paddingLeft = `${marginSizeInput.value}%`;
            prompterText.style.paddingRight = `${marginSizeInput.value}%`;
            
            baseSpeed = parseFloat(speedInput.value);
            scrollSpeed = baseSpeed;
            targetSpeed = baseSpeed;
            currentSpeedDisplay.innerText = scrollSpeed.toFixed(1);

            setupPanel.classList.add('hidden');
            statusBar.classList.remove('hidden');
            statusBar.classList.add('flex');
            
            prompterViewport.scrollTop = 0;
            isRunning = true;
            isPlaying = true;

            initAdaptiveVoice();
            tick();
        });

        // Motor com interpolação linear (Suaviza mudanças de velocidade)
        function tick() {
            if (!isRunning) return;

            if (isPlaying) {
                const timeSinceLastSpeech = Date.now() - lastSpeechTimestamp;
                
                if (timeSinceLastSpeech > 1200) { 
                    // Se houver silêncio, joga o alvo para zero rapidamente (frenagem)
                    targetSpeed = 0;
                    statusModeText.innerText = "⏸️ Aguardando voz...";
                }

                // Efeito de Amortecimento (Acelera devagar, freia rápido)
                if (scrollSpeed < targetSpeed) {
                    scrollSpeed += (targetSpeed - scrollSpeed) * 0.05; // Aceleração suave
                } else {
                    scrollSpeed += (targetSpeed - scrollSpeed) * 0.15; // Frenagem mais ágil
                }
                
                prompterViewport.scrollTop += scrollSpeed / 2;
                currentSpeedDisplay.innerText = scrollSpeed.toFixed(1);
            }

            animationFrameId = requestAnimationFrame(tick);
        }

        function initAdaptiveVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;

            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                statusModeText.innerText = "🎙️ Modo Ritmo Calibrado Ativo.";
            };

            recognition.onresult = (event) => {
                lastSpeechTimestamp = Date.now();
                
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    interimTranscript += event.results[i][0].transcript;
                }

                const wordsCount = interimTranscript.trim().split(/\s+/).filter(w => w.length > 0).length;

                if (wordsCount > 0) {
                    // TRAVAS DE SEGURANÇA E TETOS MÁXIMOS:
                    const maxSpeedLimit = baseSpeed * 1.35; // Teto rígido: no máximo 35% mais rápido que a base
                    const minSpeedLimit = baseSpeed * 0.65; // Chão rígido: no mínimo 65% da base ao falar devagar

                    if (wordsCount > 5) {
                        // Acelera o ALVO, mas respeita o limite máximo
                        targetSpeed = Math.min(maxSpeedLimit, targetSpeed + 0.1);
                        statusModeText.innerText = "⚡ Acompanhando ritmo...";
                    } else {
                        // Desacelera o ALVO de forma controlada
                        targetSpeed = Math.max(minSpeedLimit, targetSpeed - 0.05);
                        statusModeText.innerText = "🐢 Ritmo estável...";
                    }
                    isPlaying = true;
                }
            };

            recognition.onend = () => {
                if (isPlaying && isRunning) {
                    try { recognition.start(); } catch(e) {}
                }
            };

            recognition.start();
        }

        window.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            if (e.code === 'Space') {
                e.preventDefault();
                isPlaying = !isPlaying;
                if(!isPlaying) {
                    targetSpeed = 0;
                    scrollSpeed = 0;
                    statusModeText.innerText = "⏸️ Pausado";
                } else {
                    targetSpeed = baseSpeed;
                    scrollSpeed = baseSpeed;
                }
            }
            
            if (e.code === 'Escape') {
                isRunning = false; isPlaying = false;
                cancelAnimationFrame(animationFrameId);
                if (recognition) recognition.stop();
                setupPanel.classList.remove('hidden');
                statusBar.classList.add('hidden');
            }

            // Setas mudam a base de conforto em tempo real
            if (e.code === 'ArrowUp') {
                e.preventDefault();
                baseSpeed = Math.min(10, baseSpeed + 0.1);
                targetSpeed = baseSpeed;
            }
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                baseSpeed = Math.max(0.2, baseSpeed - 0.1);
                targetSpeed = baseSpeed;
            }
        });

        btnMirrorX.addEventListener('click', () => {
            mirrorX = !mirrorX;
            prompterViewport.classList.toggle('mirror-x', mirrorX);
            btnMirrorX.classList.toggle('bg-amber-500', mirrorX);
            btnMirrorX.classList.toggle('text-black', mirrorX);
        });
    </script>
</body>
</html>
