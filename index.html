<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<meta charset="UTF-8">
<title>INDEX BINGO</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align:center; padding:10px; background: #f4f4f4; margin:0; }
    .app-header { background: #333; color: #ff9800; padding: 15px; margin-bottom: 10px; border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .app-header h1 { margin: 0; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1100px; margin: 0 auto 10px auto; }
    
    .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; text-align: left; background: #eee; padding: 15px; border-radius: 8px 8px 0 0; }
    .config-grid label { font-weight: bold; font-size: 11px; color: #555; text-transform: uppercase; }
    input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; margin-top: 3px; font-family: inherit; }
    
    /* Estilos dos Alertas [cite: 7] */
    .alerta-bingo { padding: 15px; margin-bottom: 10px; border-radius: 8px; font-weight: bold; display: none; animation: pulse 1.5s infinite; font-size: 18px; }
    .alerta-armada { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .alerta-ganhador { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; font-size: 24px; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

    .premios-escritos { background: #e9ecef; padding: 10px 15px; border-radius: 0 0 8px 8px; text-align: left; margin-bottom: 15px; border: 1px solid #ccc; border-top: none; }
    .main-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; margin-top: 10px; }
    .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; width: 100%; }
    .linha { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .letra-col { width: 40px; min-width: 40px; aspect-ratio: 1/1; font-weight: bold; background: #333; color: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .num { border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; transition: 0.2s; }
    .selected { background: #ff9800; color: white; font-weight: bold; border-color: #e68a00; box-shadow: inset 0 0 8px rgba(0,0,0,0.1); }
    #ultimo { font-size: 100px; font-weight: bold; color: #d32f2f; line-height: 1; margin: 10px 0; }
    #contador { font-size: 20px; color: #666; font-weight: bold; margin-bottom: 10px; }
    .info-box { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: left; margin-bottom: 15px; }
    .info-box h3 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 2px solid #ff9800; padding-bottom: 5px; }
    .lista-resumo { list-style: none; padding: 0; margin: 0; font-size: 14px; }
    .lista-resumo li { padding: 8px 0; border-bottom: 1px solid #eee; line-height: 1.4; }
    .badge-armada { display: inline-block; background: #ff9800; color: white; padding: 3px 8px; border-radius: 10px; margin: 2px; font-size: 12px; font-weight: bold; }
    button { padding: 12px 18px; cursor: pointer; border-radius: 6px; border: none; background: #007bff; color: white; font-weight: bold; }
    .btn-reset { background: #dc3545; }
    .btn-save { background: #28a745; width: 100%; font-size: 16px; border-radius: 0 0 8px 8px; }
    
    /* Interruptor do Filtro [cite: 3] */
    .switch-pago { display: flex; align-items: center; justify-content: center; gap: 10px; background: #fff; padding: 10px; border-radius: 8px; border: 2px solid #28a745; margin-bottom: 10px; }
    #loginBox { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#ff9800; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
</style>
</head>

<body>

<div id="loginBox">
    <h1>BINGO PROFISSIONAL</h1>
    <input id="email" placeholder="Email" style="width: 280px; margin-bottom: 10px;"><br>
    <input id="senha" type="password" placeholder="Senha" style="width: 280px; margin-bottom: 20px;"><br>
    <button onclick="login()" style="width: 280px; background: #ff9800; color: #000;">ACEDER AO PAINEL</button>
</div>

<div class="app-header"><h1>BINGO PROFISSIONAL</h1></div>

<div class="card">
    <div class="config-grid">
        <div><label>Nome do Evento</label><input id="nomeBingoInput" placeholder="Ex: Bingo de Natal"></div>
        <div><label>Letras</label><input id="letrasInput" placeholder="BINGO" maxlength="5"></div>
        <div><label>Data (DD/MM/AAAA)</label><input id="dataInput" placeholder="22/04/2026" maxlength="10"></div>
        <div><label>Local</label><input id="localInput" placeholder="Pavilhão Central"></div>
        <div><label>Hora do Bingo</label><input id="horaInput" type="time"></div>
        <div><label>Valor Cartela</label><input id="valorInput" placeholder="R$ 10,00"></div>
        <div><label>Importar Excel (Obrigatório)</label><input type="file" id="fileInput"></div>
    </div>
    <div class="premios-escritos">
        <label style="font-weight: bold; font-size: 11px; color: #555;">LISTA DE PRÊMIOS DO BINGO (DESCRIÇÃO COMPLETA)</label>
        <textarea id="listaPremiosEscritos" rows="2" placeholder="Ex: 1º prêmio: 01 cafeteira, 2º prémio: 01 liquidificador..."></textarea>
    </div>
    <button class="btn-save" onclick="salvarConfiguracoes()">💾 ATUALIZAR INFORMAÇÕES NO TELÃO</button>

    <div class="main-layout">
        <div>
            <div id="msgArmada" class="alerta-bingo alerta-armada">⚠️ TEMOS CARTELAS ARMADAS!</div>
            <div id="msgGanhador" class="alerta-bingo alerta-ganhador">🎊 BINGO! TEMOS GANHADOR!</div>

            <div id="ultimo">--</div>
            <div id="contador">0 de 75</div>
            
            <div style="margin: 15px 0; background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd;">
                <button onclick="sortear()" style="background:#28a745; font-size: 22px; padding: 15px 40px; margin-right: 15px;">🎲 SORTEAR</button>
                <input id="inputNumero" type="text" inputmode="numeric" placeholder="Nº" style="width: 70px; height: 50px; text-align: center; font-size: 22px; vertical-align: middle;">
                <button onclick="inserirManual()" style="height: 50px;">ADD</button>
                <button id="btnSom" onclick="toggleSom()" style="height: 50px;">🔇 SOM</button>
                <button class="btn-reset" onclick="resetar()" style="height: 50px;">🔄 RESET</button>
            </div>

            <div id="painel"></div>
        </div>

        <div>
            <div class="switch-pago">
                <input type="checkbox" id="filtroPagas" style="width: 20px; height: 20px; cursor: pointer;">
                <label for="filtroPagas" style="font-weight: bold; color: #2e7d32; font-size: 13px;">Sorteio somente CARTELAS PAGAS</label>
            </div>

            <div class="info-box">
                <h3>🏆 GANHADORES</h3>
                <ul id="listaGanhadores" class="lista-resumo"><li style="color:#999">Aguardando sorteio...</li></ul>
            </div>

            <div class="info-box">
                <h3>🔥 CARTELAS ARMADAS (<span id="countArmadas">0</span>)</h3>
                <div id="listaArmadas"><small style="color:#999">Nenhuma armada...</small></div>
            </div>
            
            <p style="font-size: 12px; color: #777; text-align: left; padding: 0 10px;">* O botão abaixo repete a voz do último número sorteado para o salão.</p>
            <button onclick="repetirAudio()" style="width:100%; background:#6c757d; padding: 15px;">🔁 REPETIR VOZ DA PEDRA</button>
            <button onclick="sair()" style="width:100%; margin-top:10px; background:#333">🚪 SAIR</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
    authDomain: "bingo-facuc.firebaseapp.com",
    databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com/",
    projectId: "bingo-facuc",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

document.getElementById('dataInput').addEventListener('input', function (e) {
    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,2})(\d{0,4})/);
    e.target.value = !x[2] ? x[1] : x[1] + '/' + x[2] + (x[3] ? '/' + x[3] : '');
});

document.getElementById('valorInput').addEventListener('blur', function (e) {
    let valor = e.target.value.replace(/\D/g, '');
    if(valor === "") return;
    valor = (valor / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    e.target.value = valor;
});

let sorteados=[];
let letras=["B","I","N","G","O"];
let cartelas={};
let premios=[];
let somAtivo=false;
let ultimaPedraFalada=null;

function login(){
    let e = document.getElementById("email").value;
    let s = document.getElementById("senha").value;
    firebase.auth().signInWithEmailAndPassword(e, s).catch(()=> alert("Acesso negado."));
}
firebase.auth().onAuthStateChanged(user => { if(user) document.getElementById("loginBox").style.display="none"; });
function sair(){ firebase.auth().signOut(); location.reload(); }

function salvarConfiguracoes() {
    let valL = document.getElementById("letrasInput").value.toUpperCase();
    if(valL.length === 5) letras = valL.split("");
    db.ref("bingo").update({
        nomeBingo: document.getElementById("nomeBingoInput").value,
        dataBingo: document.getElementById("dataInput").value,
        localBingo: document.getElementById("localInput").value,
        horaBingo: document.getElementById("horaInput").value, // Sincroniza hora [cite: 6]
        valorCartela: document.getElementById("valorInput").value,
        descricaoPremios: document.getElementById("listaPremiosEscritos").value,
        letras: letras
    }).then(() => alert("Dados sincronizados com o Telão!"));
    criarPainel();
}

fileInput.onchange = e => {
    let r = new FileReader();
    r.onload = ev => {
        let wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
        let j = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
        cartelas = {};
        j.forEach((l, i) => {
            if(i === 0) return;
            let idCartela = l[0]; // Assume que a primeira coluna é o número da cartela
            let nums = l.slice(1, 26).map(n => parseInt(n)).filter(n => !isNaN(n));
            if(nums.length === 25 && idCartela) cartelas[idCartela] = nums;
        });
        db.ref("bingo/cartelas").set(cartelas);
        alert("Cartelas importadas com sucesso!");
    };
    r.readAsArrayBuffer(e.target.files[0]);
};

function sortear(){
    let disp=[];
    for(let i=1; i<=75; i++) if(!sorteados.includes(i)) disp.push(i);
    if(!disp.length) return;
    adicionarNumero(disp[Math.floor(Math.random()*disp.length)]);
}

function inserirManual(){
    let n = parseInt(document.getElementById("inputNumero").value);
    if(n) adicionarNumero(n);
    document.getElementById("inputNumero").value = "";
}

function adicionarNumero(n){
    if(!n || n<1 || n>75 || sorteados.includes(n)) return;
    sorteados.push(n);
    let pedraTexto = letras[Math.floor((n-1)/15)] + " " + n;
    ultimaPedraFalada = pedraTexto;
    falar(pedraTexto);
    salvarJogo();
}

function resetar(){
    if(!confirm("Deseja limpar o sorteio atual?")) return;
    sorteados = []; premios = []; ultimaPedraFalada = null;
    db.ref("bingo").update({ sorteados: [], premios: [], armadas: [] });
}

async function salvarJogo(){
    const filtrarPagas = document.getElementById("filtroPagas").checked;
    let vendas = {};
    
    // Busca status das vendas do Firebase (controle.html) [cite: 19, 21]
    if(filtrarPagas) {
        const snap = await db.ref("bingo/vendas").once("value");
        vendas = snap.val() || {};
    }

    let armadas = [];
    let ganhadoresNestaRodada = [];
    let ultimaBolinha = sorteados[sorteados.length - 1];

    for(let id in cartelas){
        // Validação: se o filtro estiver ativo, a cartela deve estar como "paga" [cite: 13, 21]
        if(filtrarPagas && (!vendas[id] || vendas[id].status !== "paga")) continue;

        let acertos = cartelas[id].filter(n => sorteados.includes(n)).length;
        if(acertos === 24) armadas.push(id);
        if(acertos === 25) {
            if(!premios.some(p => p.ganhadores.includes(id))) ganhadoresNestaRodada.push(id);
        }
    }
    
    if(ganhadoresNestaRodada.length > 0) {
        premios.push({ numero: premios.length + 1, pedra: ultimaBolinha, ganhadores: ganhadoresNestaRodada });
    }
    db.ref("bingo").update({ sorteados, premios, armadas });
}

db.ref("bingo").on("value", snap => {
    let d = snap.val();
    if(!d) return;
    sorteados = d.sorteados || [];
    letras = d.letras || ["B","I","N","G","O"];
    cartelas = d.cartelas || {};
    premios = d.premios || [];
    
    // Controle de Exibição dos Alertas [cite: 8]
    document.getElementById("msgArmada").style.display = (d.armadas && d.armadas.length > 0) ? "block" : "none";
    document.getElementById("msgGanhador").style.display = (premios.length > 0) ? "block" : "none";

    if(sorteados.length) {
        let u = sorteados[sorteados.length-1];
        document.getElementById("ultimo").innerText = letras[Math.floor((u-1)/15)] + " " + u;
    } else {
        document.getElementById("ultimo").innerText = "--";
    }
    document.getElementById("contador").innerText = sorteados.length + " pedras chamadas";

    let htmlP = "";
    premios.forEach(p => {
        let letraP = letras[Math.floor((p.pedra-1)/15)];
        htmlP += `<li><b>${p.numero}º Prémio (${letraP} ${p.pedra})</b><br>${p.ganhadores.join(", ")}</li>`;
    });
    document.getElementById("listaGanhadores").innerHTML = htmlP || "<li>Aguardando...</li>";

    let htmlA = "";
    (d.armadas || []).forEach(a => { htmlA += `<span class="badge-armada">${a}</span>`; });
    document.getElementById("listaArmadas").innerHTML = htmlA || "<small>...</small>";
    document.getElementById("countArmadas").innerText = (d.armadas || []).length;
    criarPainel();
});

function criarPainel(){
    let p = document.getElementById("painel");
    p.innerHTML = "";
    letras.forEach((l, i) => {
        let divLinha = document.createElement("div"); divLinha.className = "linha";
        let divLetra = document.createElement("div"); divLetra.className = "letra-col"; divLetra.innerText = l;
        divLinha.appendChild(divLetra);
        let divGrid = document.createElement("div"); divGrid.className = "grid";
        for(let n = i*15+1; n <= i*15+15; n++){
            let d = document.createElement("div"); d.className = "num " + (sorteados.includes(n) ? "selected" : "");
            d.innerText = n; d.onclick = () => adicionarNumero(n);
            divGrid.appendChild(d);
        }
        divLinha.appendChild(divGrid);
        p.appendChild(divLinha);
    });
}

function falar(t){ if(somAtivo){ let m=new SpeechSynthesisUtterance(t); m.lang="pt-BR"; m.rate=0.85; speechSynthesis.cancel(); speechSynthesis.speak(m); }}
function repetirAudio(){ if(ultimaPedraFalada) falar(ultimaPedraFalada); }
function toggleSom(){ somAtivo=!somAtivo; document.getElementById("btnSom").innerText=somAtivo?"🔊 ON":"🔇 OFF"; }
</script>
</body>
</html>
