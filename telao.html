<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SUPER TELÃO BINGO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
html, body{
  width:100%;
  height:100%;
}

body{
  background:#000;
  color:#00ffcc;
  font-family:Arial;
  margin:0;
  padding:clamp(5px,2vw,15px);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.container{
  width:100%;
  max-width:1100px;
}

#topo{
  text-align:center;
  width:100%;
}

#n{
  font-size:clamp(80px, 12vw, 200px);
  font-weight:bold;
  text-shadow:0 0 20px #00ffcc;
}

#c{
  font-size:clamp(14px,2vw,22px);
}

#ganhador{
  font-size:clamp(24px,5vw,45px);
  color:#ff9800;
  font-weight:bold;
}

#premios, #armadas{
  width:100%;
  max-width:1100px;
  margin:auto;
  word-break:break-word;
}

#armadas{
  margin-top:20px;
}

#conteudo{
  display:flex;
  justify-content:space-evenly;
  align-items:flex-start;
  gap:40px;
  margin-top:10px;
  width:100%;
  max-width:1100px;
}

@media (max-width:900px){
  #conteudo{
    flex-direction:column;
    align-items:center;
  }
}

.titulos{
  display:flex;
  justify-content:space-evenly;
  width:100%;
  max-width:1100px;
}

.tituloBox{
  width:50%;
  text-align:center;
}

.tituloBox h2{
  margin:0;
  white-space:nowrap;
  overflow:hidden;
}

.linha-verde, .linha-laranja{
  height:2px;
  background:#00ffcc;
}

/* 🔥 LINHAS TRAVADAS PERFEITAS */
.linha-real{
  height:2px;
  background:#00ffcc;
  margin:4px auto 6px auto;
  width:calc(5 * clamp(30px,4vw,60px) + 20px);
}

.linha-cartela-fixa{
  height:2px;
  background:#00ffcc;
  margin:6px auto;
  width:220px;
}

#painel{
  padding:10px;
  border:2px solid #00ffcc;
  border-radius:8px;
}

#lateral{
  width:220px;
  background:#111;
  padding:10px;
  text-align:center;
  border-radius:8px;
  border:2px solid orange;
}

#inputCartela{
  width:100%;
  padding:6px;
  font-size:18px;
  text-align:center;
}

.botaoSom{
  position:absolute;
  top:10px;
  right:10px;
  padding:5px 10px;
  cursor:pointer;
}

.linhaCartela{
  display:flex;
  justify-content:center;
}

.numCartela{
  width:clamp(25px,6vw,30px);
  height:clamp(25px,6vw,30px);
  margin:1px;
  border:1px solid #555;
  display:flex;
  align-items:center;
  justify-content:center;
}

.selCartela{
  background:orange;
  color:#000;
}
</style>
</head>

<body>

<button class="botaoSom" onclick="toggleSom()">🔊 Som ON</button>

<div class="container">
  <div id="topo">
    <div id="n">--</div>
    <div id="c"></div>
    <div id="ganhador"></div>
    <div id="premios"></div>
    <div id="armadas"></div>
  </div>
</div>

<div class="titulos">
  <div class="tituloBox">
    <h2>🎯 BINGO GERAL</h2>
    <div class="linha-real"></div>
  </div>
  <div class="tituloBox">
    <h2>🎫 CARTELA</h2>
    <div class="linha-cartela-fixa"></div>
  </div>
</div>

<div id="conteudo">
  <div>
    <div id="painel"></div>
  </div>

  <div id="lateral">
    <input id="inputCartela" placeholder="Digite o nº da cartela">
    <div id="cartelaVisual"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
  authDomain: "bingo-facuc.firebaseapp.com",
  databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com",
  projectId: "bingo-facuc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let somAtivo = true;
let ultimoNumero = null;

function toggleSom(){
  somAtivo = !somAtivo;
  document.querySelector('.botaoSom').innerText = somAtivo ? "🔊 Som ON" : "🔇 Som OFF";
}

function falarNumero(n){
  if(!somAtivo || n === ultimoNumero) return;

  const letra = letras[Math.floor((n-1)/15)];

  speechSynthesis.cancel();

  setTimeout(()=>{
    const msg = new SpeechSynthesisUtterance(`${letra} ${n}`);
    msg.lang = "pt-BR";
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
  }, 100);

  ultimoNumero = n;
}

let letras=["B","I","N","G","O"];
let cartelas={};
let sorteados=[];

function getLetra(n){
  return letras[Math.floor((n-1)/15)];
}

function desenharPainel(s){
  let painel=document.getElementById("painel");
  painel.innerHTML="";

  let topo=document.createElement("div");
  topo.style.display="flex";
  topo.style.justifyContent="center";

  letras.forEach(l=>{
    let d=document.createElement("div");
    d.style.width="clamp(30px,4vw,60px)";
    d.style.height="clamp(30px,4vw,60px)";
    d.style.display="flex";
    d.style.alignItems="center";
    d.style.justifyContent="center";
    d.style.fontWeight="bold";
    d.style.fontSize="clamp(16px,2vw,28px)";
    d.innerText=l;
    topo.appendChild(d);
  });

  painel.appendChild(topo);

  for(let i=0;i<15;i++){
    let linha=document.createElement("div");
    linha.style.display="flex";
    linha.style.justifyContent="center";

    for(let j=0;j<5;j++){
      let n = j*15 + (i+1);
      let d=document.createElement("div");
      d.innerText=n;

      d.style.width="clamp(30px,4vw,60px)";
      d.style.height="clamp(25px,3.5vw,50px)";
      d.style.margin="2px";
      d.style.border="1px solid #00ffcc";
      d.style.display="flex";
      d.style.alignItems="center";
      d.style.justifyContent="center";

      if(s.includes(n)){
        d.style.background="#00ffcc";
        d.style.color="#000";
        d.style.fontWeight="bold";
      }

      linha.appendChild(d);
    }
    painel.appendChild(linha);
  }
}

function atualizarCartela(){
  let id=document.getElementById("inputCartela").value.trim();
  let div=document.getElementById("cartelaVisual");

  if(!id){ div.innerHTML=""; return; }

  let chave=null;
  for(let k in cartelas){
    if(String(k).replace(/^0+/,"")===id){ chave=k; break; }
  }

  if(!chave){
    div.innerHTML="Cartela não encontrada";
    return;
  }

  let nums=cartelas[chave];
  let html="";

  html += "<div class='linhaCartela'>";
  letras.forEach(l=>{
    html += `<div class='numCartela' style="font-weight:bold;background:#222">${l}</div>`;
  });
  html += "</div>";

  for(let i=0;i<5;i++){
    html+="<div class='linhaCartela'>";
    for(let j=0;j<5;j++){
      let n = nums[j*5 + i];
      let sel = sorteados.includes(n) ? "selCartela" : "";
      html+=`<div class='numCartela ${sel}'>${n}</div>`;
    }
    html+="</div>";
  }

  div.innerHTML=html;
}

document.getElementById("inputCartela").addEventListener("input", atualizarCartela);

db.ref("bingo").on("value", snap=>{
  let d=snap.val();
  if(!d) return;

  sorteados=d.sorteados||[];
  cartelas=d.cartelas||cartelas;

  if(d.letras){
    letras = Array.isArray(d.letras) ? d.letras : d.letras.split("");
  }

  if(sorteados.length){
    let u=sorteados[sorteados.length-1];
    document.getElementById("n").innerText=getLetra(u)+" "+u;
    document.getElementById("c").innerText=sorteados.length+" de 75";
    falarNumero(u);
  }

  let premiosHTML="";
  (d.premios||[]).forEach(p=>{
    premiosHTML += `<div><b>${p.numero}º PRÊMIO</b> (${getLetra(p.pedra)} ${p.pedra}) - ${p.ganhadores.join(", ")}</div>`;
  });
  document.getElementById("premios").innerHTML=premiosHTML;

  if(d.armadas?.length){
    document.getElementById("armadas").innerHTML =
      `<b>🔥 CARTELAS ARMADAS (${d.armadas.length})</b><br>` +
      d.armadas.join(" | ");
  } else {
    document.getElementById("armadas").innerHTML="";
  }

  document.getElementById("ganhador").innerHTML =
    (d.premios||[]).length ? "🏆 GANHADOR(A)" : "";

  desenharPainel(sorteados);
  atualizarCartela();
});
</script>

</body>
</html>
