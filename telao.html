<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo Ao Vivo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  background:black;
  color:#00ffcc;
  text-align:center;
  font-family:Arial;
}

#n { font-size:140px; margin-top:10px; }
#c { font-size:25px; margin-bottom:15px; }

.linha {
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:6px;
}

.letra {
  width:40px;
  font-weight:bold;
  margin-right:10px;
}

.num {
  width:32px;
  height:32px;
  margin:2px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid #00ffcc;
  border-radius:5px;
}

.selected {
  background:#00ffcc;
  color:#000;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="n">--</div>
<div id="c"></div>

<div id="painel"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
  authDomain: "bingo-facuc.firebaseapp.com",
  databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com",
  projectId: "bingo-facuc",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let letras = ["B","I","N","G","O"];

function getLetra(n){
  return letras[Math.floor((n-1)/15)];
}

function criarPainel(sorteados){
  painel.innerHTML="";

  letras.forEach((l,i)=>{
    let linha=document.createElement("div");
    linha.className="linha";

    let letra=document.createElement("div");
    letra.className="letra";
    letra.innerText=l;
    linha.appendChild(letra);

    for(let n=i*15+1;n<=i*15+15;n++){
      let d=document.createElement("div");
      d.className="num";
      d.innerText=n;

      if(sorteados.includes(n)){
        d.classList.add("selected");
      }

      linha.appendChild(d);
    }

    painel.appendChild(linha);
  });
}

db.ref("bingo").on("value", (snap)=>{
  let d = snap.val();
  if(!d) return;

  let sorteados = d.sorteados || [];
  letras = d.letras || letras;

  if(sorteados.length){
    let u = sorteados[sorteados.length-1];
    n.innerText = getLetra(u)+" "+u;
    c.innerText = sorteados.length+" de 75";
  } else {
    n.innerText="--";
    c.innerText="";
  }

  criarPainel(sorteados);
});
</script>

</body>
</html>
