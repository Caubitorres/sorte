<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telão Bingo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  background:#000;
  color:#00ffcc;
  text-align:center;
  font-family:Arial;
}

#fullscreenBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:#00ffcc;
  color:#000;
  border:none;
  padding:10px 15px;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
  z-index:999;
}

#n{font-size:120px;}
#c{font-size:20px;}

.linha{
  display:flex;
  justify-content:center;
  margin:4px 0;
}

/* 🔥 BINGO sem fundo (visual mais limpo) */
.letra{
  width:45px;
  height:35px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:22px;
  color:#00ffcc;
  background:transparent;
  border:none;
  margin-right:6px;
  letter-spacing:1px;
}

.num{
  width:35px;
  height:35px;
  margin:2px;
  border:1px solid #00ffcc;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  font-weight:bold;
}

.sel{
  background:#00ffcc;
  color:#000;
  font-weight:bold;
}

#ganhador{
  color:#ff9800;
  font-size:40px;
  margin-top:10px;
}

#premios{
  font-size:18px;
  margin-top:10px;
}

#armadas{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<button id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Tela Cheia</button>

<div id="n">--</div>
<div id="c"></div>

<div id="ganhador"></div>
<div id="premios"></div>

<div id="armadas"></div>

<div id="painel"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
  authDomain: "bingo-facuc.firebaseapp.com",
  databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com/",
  projectId: "bingo-facuc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let elNumero = document.getElementById("n");
let elContador = document.getElementById("c");
let elGanhador = document.getElementById("ganhador");
let elPremios = document.getElementById("premios");
let elArmadas = document.getElementById("armadas");

let letras = ["B","I","N","G","O"];

function getLetra(n){
  return letras[Math.floor((n-1)/15)];
}

function toggleFullscreen(){
  if (!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function desenharPainel(s){
  let painel = document.getElementById("painel");
  painel.innerHTML="";

  letras.forEach((l,i)=>{
    let linha=document.createElement("div");
    linha.className="linha";

    let letra=document.createElement("div");
    letra.className="letra";
    letra.innerText=l;
    linha.appendChild(letra);

    for(let n=i*15+1;n<=i*15+15;n++){
      let d=document.createElement("div");
      d.className="num";
      d.innerText=n;

      if(s.includes(n)){
        d.classList.add("sel");
      }

      linha.appendChild(d);
    }

    painel.appendChild(linha);
  });
}

db.ref("bingo").on("value", snap=>{
  let d = snap.val();
  if(!d) return;

  let s = d.sorteados || [];
  letras = d.letras || letras;

  let listaPremios = d.premios || [];
  let listaArmadas = d.armadas || [];

  if(s.length){
    let u = s[s.length-1];
    elNumero.innerText = getLetra(u)+" "+u;
    elContador.innerText = s.length+" de 75";
  } else {
    elNumero.innerText="--";
    elContador.innerText="";
  }

  if(listaPremios.length){
    elGanhador.innerText="🎉 PARABÉNS!!!";

    let txt="";
    listaPremios.forEach(p=>{
      txt += "<div style='margin:6px 0'>";
      txt += "<b style='font-size:22px'>" + p.numero + "º prêmio</b> ";
      txt += "(" + getLetra(p.pedra) + " " + p.pedra + ") - ";
      txt += p.ganhadores.join(", ");
      txt += "</div>";
    });

    elPremios.innerHTML = txt;
  } else {
    elGanhador.innerText="";
    elPremios.innerHTML="";
  }

  if(listaArmadas.length){
    elArmadas.innerHTML = "🔥 Armadas: " + listaArmadas.join(" | ");
  } else {
    elArmadas.innerHTML="";
  }

  desenharPainel(s);
});
</script>

</body>
</html>
