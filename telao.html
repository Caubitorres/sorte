<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SUPER TELÃO BINGO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  background:#000;
  color:#00ffcc;
  font-family:Arial;
  display:flex;
}

/* principal */
#principal{
  width:70%;
  text-align:center;
}

#n{font-size:100px;}
#c{font-size:20px;}

.linha{
  display:flex;
  justify-content:center;
}

.letra{
  width:30px;
  font-weight:bold;
}

.num{
  width:30px;
  height:30px;
  margin:2px;
  border:1px solid #00ffcc;
  display:flex;
  align-items:center;
  justify-content:center;
}

.sel{
  background:#00ffcc;
  color:#000;
}

/* ganhador */
#ganhador{
  font-size:50px;
  color:#ff9800;
  font-weight:bold;
  margin:10px 0;
  animation: piscar 1s infinite;
}

@keyframes piscar{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* lateral */
#lateral{
  width:30%;
  background:#111;
  padding:15px;
  text-align:center;
}

#inputCartela{
  padding:12px;
  font-size:22px;
  width:230px;
  text-align:center;
  margin-bottom:10px;
}

/* cartela */
.linhaCartela{
  display:flex;
  justify-content:center;
}

.numCartela{
  width:40px;
  height:40px;
  margin:3px;
  border:1px solid #555;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
}

.selCartela{
  background:orange;
  color:#000;
}

/* textos */
#premios{
  font-size:18px;
}

#armadas{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="principal">
  <div id="n">--</div>
  <div id="c"></div>

  <div id="ganhador"></div>
  <div id="premios"></div>
  <div id="armadas"></div>

  <div id="painel"></div>
</div>

<div id="lateral">
  <h2>Cartela</h2>
  <input id="inputCartela" placeholder="Nº da cartela">
  <div id="cartelaVisual"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
  authDomain: "bingo-facuc.firebaseapp.com",
  databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com/",
  projectId: "bingo-facuc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let letras=["B","I","N","G","O"];
let cartelas={};
let sorteados=[];

function getLetra(n){
  return letras[Math.floor((n-1)/15)];
}

/* painel */
function desenharPainel(s){
  let painel=document.getElementById("painel");
  painel.innerHTML="";

  letras.forEach((l,i)=>{
    let linha=document.createElement("div");
    linha.className="linha";

    let letra=document.createElement("div");
    letra.className="letra";
    letra.innerText=l;
    linha.appendChild(letra);

    for(let n=i*15+1;n<=i*15+15;n++){
      let d=document.createElement("div");
      d.className="num";
      d.innerText=n;

      if(s.includes(n)) d.classList.add("sel");

      linha.appendChild(d);
    }

    painel.appendChild(linha);
  });
}

/* cartela lateral */
function atualizarCartela(){
  let id=inputCartela.value.trim();
  let div=document.getElementById("cartelaVisual");

  if(!id){ div.innerHTML=""; return; }

  let chave=null;

  for(let k in cartelas){
    if(String(k).replace(/^0+/,"")===id){
      chave=k; break;
    }
  }

  if(!chave){
    div.innerHTML="Cartela não encontrada";
    return;
  }

  let nums=cartelas[chave];
  let html="";

  html += "<div class='linhaCartela'>";
  letras.forEach(l=>{
    html += `<div class='numCartela' style="font-weight:bold;background:#222">${l}</div>`;
  });
  html += "</div>";

  for(let i=0;i<5;i++){
    html+="<div class='linhaCartela'>";
    for(let j=0;j<5;j++){
      let n = nums[j*5 + i];
      let sel = sorteados.includes(n) ? "selCartela" : "";
      html+=`<div class='numCartela ${sel}'>${n}</div>`;
    }
    html+="</div>";
  }

  div.innerHTML=html;
}

inputCartela.addEventListener("input", atualizarCartela);

/* firebase */
db.ref("bingo").on("value", snap=>{
  let d=snap.val();
  if(!d) return;

  sorteados=d.sorteados||[];
  letras=d.letras||letras;
  cartelas=d.cartelas||cartelas;

  let listaPremios=d.premios||[];
  let listaArmadas=d.armadas||[];

  /* número */
  if(sorteados.length){
    let u=sorteados[sorteados.length-1];
    n.innerText=getLetra(u)+" "+u;
    c.innerText=sorteados.length+" de 75";
  }

  /* ganhador */
  if(listaPremios.length){
    ganhador.innerHTML="🏆 GANHADOR(A)";
  } else {
    ganhador.innerHTML="";
  }

  /* prêmios */
  if(listaPremios.length){
    let txt="";
    listaPremios.forEach(p=>{
      txt+=`<div>${p.numero}º prêmio (${getLetra(p.pedra)} ${p.pedra}) - ${p.ganhadores.join(", ")}</div>`;
    });
    premios.innerHTML=txt;
  } else {
    premios.innerHTML="";
  }

  /* 🔥 cartelas armadas em linha */
  if(listaArmadas.length){
    armadas.innerHTML = `
      <div style="font-size:22px;color:#ff5722;font-weight:bold">
        🔥 CARTELAS ARMADAS (${listaArmadas.length})
      </div>

      <div style="
        margin-top:8px;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:8px;
      ">
        ${listaArmadas.map(n => `
          <div style="
            background:#ff5722;
            color:#fff;
            padding:6px 10px;
            border-radius:6px;
            font-weight:bold;
          ">
            ${n}
          </div>
        `).join("")}
      </div>
    `;
  } else {
    armadas.innerHTML="";
  }

  desenharPainel(sorteados);
  atualizarCartela();
});
</script>

</body>
</html>
