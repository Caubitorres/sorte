<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telão Bingo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  background:black;
  color:#00ffcc;
  text-align:center;
  font-family:Arial;
}

/* topo */
#n { font-size:140px; margin-top:10px; }
#c { font-size:25px; margin-bottom:10px; }

/* painel */
.linha {
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:6px;
}

.letra {
  width:40px;
  font-weight:bold;
  margin-right:10px;
}

.num {
  width:32px;
  height:32px;
  margin:2px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid #00ffcc;
  border-radius:5px;
}

.selected {
  background:#00ffcc;
  color:#000;
  font-weight:bold;
}

/* ganhadores */
#ganhador {
  font-size:50px;
  color:#ff9800;
  margin-top:10px;
}

#premios {
  font-size:22px;
  margin-bottom:10px;
}

/* armadas */
#armadasTitulo {
  font-size:26px;
  color:#ff5722;
}

#armadas {
  font-size:20px;
}
</style>
</head>

<body>

<div id="n">--</div>
<div id="c"></div>

<div id="ganhador"></div>
<div id="premios"></div>

<div id="armadasTitulo"></div>
<div id="armadas"></div>

<div id="painel"></div>

<script>
const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "COLE_AQUI",
  databaseURL: "COLE_AQUI",
  projectId: "COLE_AQUI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let letras = ["B","I","N","G","O"];

function getLetra(n){
  return letras[Math.floor((n-1)/15)];
}

function criarPainel(sorteados){
  let painel = document.getElementById("painel");
  painel.innerHTML="";

  letras.forEach((l,i)=>{
    let linha=document.createElement("div");
    linha.className="linha";

    let letra=document.createElement("div");
    letra.className="letra";
    letra.innerText=l;
    linha.appendChild(letra);

    for(let n=i*15+1;n<=i*15+15;n++){
      let d=document.createElement("div");
      d.className="num";
      d.innerText=n;

      if(sorteados.includes(n)){
        d.classList.add("selected");
      }

      linha.appendChild(d);
    }

    painel.appendChild(linha);
  });
}

db.ref("bingo").on("value", (snap)=>{
  let d = snap.val();
  if(!d) return;

  let sorteados = d.sorteados || [];
  letras = d.letras || letras;
  let premios = d.premios || [];
  let armadas = d.armadas || [];

  /* número */
  if(sorteados.length){
    let u = sorteados[sorteados.length-1];
    n.innerText = getLetra(u)+" "+u;
    c.innerText = sorteados.length+" de 75";
  } else {
    n.innerText="--";
    c.innerText="";
  }

  /* ganhadores */
  if(premios.length){
    ganhador.innerText="🎉 PARABÉNS!!!";

    let html="";
    premios.forEach(p=>{
      let letra=getLetra(p.pedra);
      html += "<div><b>"+p.numero+"º PRÊMIO ("+letra+" "+p.pedra+")</b></div>";
      p.ganhadores.forEach(g=>{
        html += "<div>- "+g+"</div>";
      });
    });

    premiosDiv.innerHTML = html;
  } else {
    ganhador.innerText="";
    premiosDiv.innerHTML="";
  }

  /* armadas */
  if(armadas.length){
    armadasTitulo.innerText="🔥 CARTELAS ARMADAS ("+armadas.length+")";
    armadasDiv.innerText = armadas.join(" | ");
  } else {
    armadasTitulo.innerText="";
    armadasDiv.innerText="";
  }

  criarPainel(sorteados);
});
</script>

</body>
</html>
