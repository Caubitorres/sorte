<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telão Bingo</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  background:black;
  color:#00ffcc;
  text-align:center;
  font-family:Arial;
}

#n { font-size:120px; }
#c { font-size:20px; }

.linha {
  display:flex;
  justify-content:center;
  margin-bottom:5px;
}

.num {
  width:30px;
  height:30px;
  margin:2px;
  border:1px solid #00ffcc;
  display:flex;
  align-items:center;
  justify-content:center;
}

.sel {
  background:#00ffcc;
  color:#000;
}
</style>
</head>

<body>

<div id="n">--</div>
<div id="c"></div>

<div id="painel"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
  authDomain: "bingo-facuc.firebaseapp.com",
  databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com/",
  projectId: "bingo-facuc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let letras = ["B","I","N","G","O"];

function letra(n){
  return letras[Math.floor((n-1)/15)];
}

function desenhar(s){
  let p = document.getElementById("painel");
  p.innerHTML="";

  letras.forEach((l,i)=>{
    let linha=document.createElement("div");
    linha.className="linha";

    for(let n=i*15+1;n<=i*15+15;n++){
      let d=document.createElement("div");
      d.className="num";
      d.innerText=n;

      if(s.includes(n)) d.classList.add("sel");

      linha.appendChild(d);
    }

    p.appendChild(linha);
  });
}

db.ref("bingo").on("value", snap=>{
  let d = snap.val();
  if(!d) return;

  let s = d.sorteados || [];
  letras = d.letras || letras;

  if(s.length){
    let u = s[s.length-1];
    n.innerText = letra(u)+" "+u;
    c.innerText = s.length+" de 75";
  }

  desenhar(s);
});
</script>

</body>
</html>
