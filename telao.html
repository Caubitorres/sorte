<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SUPER TELÃO BINGO</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  background:#000;
  color:#00ffcc;
  font-family:Arial;
  margin:0;
  padding:10px;
}
#app{ max-width:1000px; margin:auto; }
#btnSom{ position:absolute; top:10px; left:10px; padding:6px 12px; cursor:pointer; }
#topoGeral{ display:grid; grid-template-columns: 1fr auto; gap:20px; }
#sorteio{ text-align:center; }

#ganhador{
  font-size:32px;
  font-weight:bold;
  color:yellow;
  margin-top:12px;
  text-shadow:0 0 12px yellow;
}

#premios{
  margin-top:18px;
  line-height:1.8;
  font-size:22px;
}

#armadas{ margin-top:18px; line-height:1.8; }

#n{
  font-size:clamp(100px,14vw,220px);
  font-weight:bold;
  text-shadow:0 0 30px #00ffcc;
}

#cartelaArea{
  display:inline-block;
  background:#111;
  padding:6px;
  border-radius:8px;
  border:2px solid orange;
}

.numCartela{
  width:36px; height:36px; margin:2px;
  border:1px solid #555;
  display:flex; align-items:center; justify-content:center;
}

#inputCartela{
  width:calc(5 * (36px + 4px));
  height:36px;
  font-size:18px;
  text-align:center;
  margin:0 auto 6px auto;
  display:block;
}

#tituloPainel{ margin-top:20px; margin-left:44px; font-weight:bold; }

.containerPainel{ display:flex; }

.colLetras{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.letra{
  width:40px;
  height:clamp(25px,3vw,40px);
  margin:2px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  background:#00ffcc;
  color:#000;
}

.grid{ flex:1; }

.linha{ display:flex; }

.numero{
  flex:1;
  height:clamp(25px,3vw,40px);
  margin:2px;
  border:1px solid #00ffcc;
  display:flex;
  align-items:center;
  justify-content:center;
}

.marcado{
  background:#00ffcc;
  color:#000;
  font-weight:bold;
}

.linhaCartela{
  display:flex;
  justify-content:center;
}

.selCartela{
  background:orange;
  color:#000;
}
</style>
</head>

<body>

<button id="btnSom" onclick="toggleSom()">🔊 Som ON</button>

<div id="app">
  <div id="topoGeral">

    <div id="sorteio">
      <div id="n">--</div>
      <div id="c"></div>
      <div id="ganhador"></div>
      <div id="premios"></div>
      <div id="armadas"></div>
    </div>

    <div id="cartelaArea">
      <input id="inputCartela" placeholder="Nº cartela">
      <div id="cartelaVisual"></div>
    </div>

  </div>

  <div id="tituloPainel">🎯 BINGO GERAL</div>
  <div id="painel"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBYpJLTbts47UQge9xwGJlggnuFO1n381o",
  authDomain: "bingo-facuc.firebaseapp.com",
  databaseURL: "https://bingo-facuc-default-rtdb.firebaseio.com",
  projectId: "bingo-facuc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let letras = ["B","I","N","G","O"];
let cartelas={};
let sorteados=[];

let somAtivo=true;
let ultimoNumero=null;
let controleFala=0;

function validarLetras(arr){
  if(!Array.isArray(arr) || arr.length!==5) return false;
  let upper = arr.map(l => String(l).toUpperCase());
  return (new Set(upper).size===5) ? upper : false;
}

function toggleSom(){
  somAtivo=!somAtivo;
  if(!somAtivo){
    controleFala++;
    speechSynthesis.cancel();
  }
  document.getElementById("btnSom").innerText =
    somAtivo ? "🔊 Som ON" : "🔇 Som OFF";
}

function falarNumero(n){
  if(!somAtivo || n===ultimoNumero) return;

  controleFala++;
  const idAtual=controleFala;

  const letra=getLetra(n);
  speechSynthesis.cancel();

  setTimeout(()=>{
    if(!somAtivo || idAtual!==controleFala) return;
    const msg=new SpeechSynthesisUtterance(`${letra} ${n}`);
    msg.lang="pt-BR";
    msg.rate=0.9;
    speechSynthesis.speak(msg);
  },100);

  ultimoNumero=n;
}

function getLetra(n){
  return letras[Math.floor((n-1)/15)];
}

function desenharPainel(s){
  let painel=document.getElementById("painel");
  painel.innerHTML="";

  let container=document.createElement("div");
  container.className="containerPainel";

  let colLetras=document.createElement("div");
  colLetras.className="colLetras";

  letras.forEach(l=>{
    let d=document.createElement("div");
    d.innerText=l;
    d.className="letra";
    colLetras.appendChild(d);
  });

  let grid=document.createElement("div");
  grid.className="grid";

  for(let i=0;i<5;i++){
    let linha=document.createElement("div");
    linha.className="linha";

    for(let j=1;j<=15;j++){
      let n=i*15+j;
      let d=document.createElement("div");
      d.innerText=n;
      d.className="numero";
      if(s.includes(n)) d.classList.add("marcado");
      linha.appendChild(d);
    }

    grid.appendChild(linha);
  }

  container.appendChild(colLetras);
  container.appendChild(grid);
  painel.appendChild(container);
}

function atualizarCartela(){
  let id=document.getElementById("inputCartela").value.trim();
  let div=document.getElementById("cartelaVisual");

  if(!id){ div.innerHTML=""; return; }

  let chave=null;
  for(let k in cartelas){
    if(String(k).replace(/^0+/,"")===id){ chave=k; break; }
  }

  if(!chave){
    div.innerHTML="Não encontrada";
    return;
  }

  let nums=cartelas[chave];
  let html="";

  html+="<div class='linhaCartela'>";
  letras.forEach(l=>{
    html+=`<div class='numCartela'><b>${l}</b></div>`;
  });
  html+="</div>";

  for(let i=0;i<5;i++){
    html+="<div class='linhaCartela'>";
    for(let j=0;j<5;j++){
      let n=nums[j*5+i];
      let sel=sorteados.includes(n)?"selCartela":"";
      html+=`<div class='numCartela ${sel}'>${n}</div>`;
    }
    html+="</div>";
  }

  div.innerHTML=html;
}

document.getElementById("inputCartela").addEventListener("input", atualizarCartela);

db.ref("bingo").on("value", snap=>{
  let d=snap.val();
  if(!d) return;

  let novas = validarLetras(d.letras);
  if(novas) letras = novas;

  sorteados = d.sorteados || [];
  cartelas = d.cartelas || {};

  if(!sorteados.length){
    document.getElementById("n").innerText="--";
    document.getElementById("c").innerText="";
    document.getElementById("ganhador").innerHTML="";
  } else {
    let u=sorteados[sorteados.length-1];
    document.getElementById("n").innerText=getLetra(u)+" "+u;
    document.getElementById("c").innerText=sorteados.length+" de 75";
    falarNumero(u);
  }

  let premiosHTML="";
  (d.premios||[]).forEach(p=>{

    let texto = `${p.numero}º PRÊMIO`;

    // ✅ agora usa PEDRA
    let bola = Number(p.pedra || p.bola || p.numeroBola || p.ultimaBola);

    if(bola>=1 && bola<=75){
      let letra = getLetra(bola);
      texto += ` (${letra} ${bola})`;
    }

    let lista = (p.ganhadores||[]).join(", ");
    premiosHTML += `<div><b>${texto}</b> - ${lista}</div>`;
  });

  document.getElementById("premios").innerHTML=premiosHTML;

  if(d.armadas?.length){
    document.getElementById("armadas").innerHTML =
      `<b>🔥 CARTELAS ARMADAS:</b><br>` + d.armadas.join(" | ");
  } else {
    document.getElementById("armadas").innerHTML="";
  }

  document.getElementById("ganhador").innerHTML =
    (d.premios||[]).length ? "🏆 GANHADOR(A)" : "";

  desenharPainel(sorteados);
  atualizarCartela();
});
</script>

</body>
</html>
